<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mira - Template: Mira Perfect</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* @MIRA:THEME:START */
/* Tema próprio do mira-perfect (theme-agnóstico: o "new" NÃO injeta tema aqui).
   O design é intrinsecamente dark: fundo preto + UMA cor de marca dominante.
   Para trocar a cor da marca, edite só estas variáveis; o CSS e a paleta do
   bloco JS leem daqui. Default: laranja MIRA. */
:root {
    --mira-primary: #FF904D;
    --mira-primary-deep: #FF6B2C;
    --mira-accent-2: #FFC766;
    --mira-bg: #000000;
    --mira-text: #ffffff;
    --mira-text-soft: rgba(255, 255, 255, 0.74);
    --mira-text-softer: rgba(255, 255, 255, 0.50);
}

body {
    background: var(--mira-bg);
    min-height: 100vh;
    color: var(--mira-text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
        /* @MIRA:THEME:END */

        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; background: #000; }
        html { scroll-behavior: smooth; }
        /* Scroll discreto (padrao Mira): a navegacao e por teclado/botao e o
           progresso ja aparece na barra do topo; a scrollbar fica quase invisivel. */
        html { scrollbar-width: thin; scrollbar-color: #2e2e2e #0d0d0d; }
        ::-webkit-scrollbar { width: 6px; height: 6px; background: #0d0d0d; }
        ::-webkit-scrollbar-track { background: #0d0d0d; }
        ::-webkit-scrollbar-thumb { background: #2e2e2e; border-radius: 999px; }
        ::-webkit-scrollbar-thumb:hover { background: #4a4a4a; }
        ::-webkit-scrollbar-button { display: none; width: 0; height: 0; }
        body { color: #fff; overflow-x: hidden; }

        /* ============================================================
           TEMPLATE MIRA-PERFECT (animação de tela cheia + título/header)
           Design herdado do deck de lançamento do MIRA. Regras ao preencher:
           1. Cada slide é uma animação D3 de tela cheia sobre preto com
              TÍTULO e HEADER sobrepostos, legíveis pelo scrim do topo.
           2. A capa é a assinatura do deck: kicker + título gigante em
              gradiente (branco → accent → primária) sobre animação ambiente.
           3. UMA cor de marca dominante (--mira-primary + tons derivados) e
              UMA única cor fria (aço) apenas para "material bruto / estático /
              fonte protegida". Sem arco-íris.
           4. Cada palco usa viewBox 5/10 centrado e preserveAspectRatio slice;
              componha o conteúdo centrado em (640,360).
           5. Loop interno perpétuo + anti-vazamento por geração + Replay.
           6. Camada cinematográfica compartilhada (cineUnder/cineOver): brasas
              ao fundo + vinheta + flash de revelação em todo slide.
           Para um novo slide: duplique uma <section class="slide"> e registre
           a função em ANIM.sN (o trigger e o replay já acham pelo data-anim).
           ============================================================ */
        .slide {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }
        .stage {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Header sobreposto de cada slide de conteúdo */
        .slide-head {
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 5;
            padding: 48px 60px 96px;
            background: linear-gradient(180deg, rgba(0,0,0,0.86) 0%, rgba(0,0,0,0.55) 42%, rgba(0,0,0,0) 100%);
            pointer-events: none;
        }
        .slide-head .kicker {
            display: inline-block;
            font-size: 13px;
            letter-spacing: 3.5px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--mira-primary);
            margin: 0 0 12px;
        }
        .slide-head h2 {
            margin: 0;
            font-size: clamp(30px, 5vw, 60px);
            font-weight: 800;
            line-height: 1.03;
            letter-spacing: -0.02em;
            color: #fff;
            text-shadow: 0 2px 30px rgba(0,0,0,0.6);
        }
        .slide-head h2 em { color: var(--mira-primary); font-style: italic; }
        .slide-head p {
            margin: 14px 0 0;
            font-size: clamp(15px, 1.7vw, 21px);
            line-height: 1.4;
            color: var(--mira-text-soft);
            max-width: 44ch;
        }

        /* Capa (header do deck) */
        .slide-cover .cover-head {
            position: absolute;
            inset: 0;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            pointer-events: none;
        }
        .cover-head .kicker {
            font-size: clamp(12px, 1.5vw, 16px);
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--mira-accent-2);
            margin: 0 0 18px;
        }
        .cover-head h1 {
            margin: 0;
            font-size: clamp(64px, 14vw, 200px);
            font-weight: 900;
            letter-spacing: 0.05em;
            line-height: 0.9;
            background: linear-gradient(180deg, #ffffff 0%, var(--mira-accent-2) 55%, var(--mira-primary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 6px 40px color-mix(in srgb, var(--mira-primary) 35%, transparent));
        }
        /* Diretiva de título da capa (não-negociável): quebra equilibrada só na capa */
        body > section:first-of-type h1,
        body > section:first-of-type h2 { text-wrap: balance; }
        .cover-head p {
            margin: 26px 0 0;
            font-size: clamp(16px, 2.1vw, 24px);
            color: var(--mira-text-soft);
            max-width: 30ch;
        }

        .replay-btn {
            position: absolute;
            bottom: 22px; right: 22px;
            z-index: 6;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: rgba(255, 255, 255, 0.7);
            border-radius: 9999px;
            padding: 6px 14px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            opacity: 0.5;
        }
        .replay-btn:hover { opacity: 1; color: #fff; }

        /* Passagem de slides: barra de progresso + botão + teclado */
        #mira-progress {
            position: fixed; top: 0; left: 0; height: 3px; width: 0%;
            background: linear-gradient(90deg, var(--mira-primary-deep), var(--mira-primary), var(--mira-accent-2));
            background-size: 200% 100%;
            animation: mira-shimmer 3s linear infinite;
            z-index: 9999; transition: width 0.1s linear;
        }
        @keyframes mira-shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        #mira-next {
            position: fixed; bottom: 32px; left: 32px;
            width: 46px; height: 46px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.12); color: #fff;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0; transform: translateY(20px);
            transition: all 0.3s ease; z-index: 9998;
        }
        #mira-next.visible { opacity: 0.55; transform: translateY(0); }
        #mira-next.visible:hover { opacity: 1; transform: translateY(-3px) scale(1.08); }
        #mira-next svg { transition: transform 0.3s ease; }
        #mira-next.up svg { transform: rotate(180deg); }

/* @MIRA:RESPONSIVE:START */
/* Camada de reflow mobile-first: guarda contra overflow horizontal. */
html, body { max-width: 100%; overflow-x: hidden; }
img, svg, video, canvas, iframe, table, pre { max-width: 100%; }
@media (max-width: 640px) {
  .slide-head { padding: 28px 26px 80px; }
  #mira-next {
    bottom: max(1rem, env(safe-area-inset-bottom)) !important;
    right: max(1rem, env(safe-area-inset-right)) !important;
    left: auto !important;
    width: 44px !important; height: 44px !important;
  }
}
/* @MIRA:RESPONSIVE:END */
    </style>
</head>

<body>
    <div id="mira-progress"></div>
    <button id="mira-next" aria-label="Próximo slide">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </button>

    <!-- CAPA — header do deck: título gigante em gradiente sobre campo ambiente -->
    <section class="slide slide-cover" data-anim="s0">
        <!-- @MIRA:SIZE 5/10 -->
        <svg class="stage" id="s0-svg" viewBox="155.15 87.27 969.70 545.45" preserveAspectRatio="xMidYMid slice"></svg>
        <div class="cover-head">
            <span class="kicker">Kicker da capa · substitua</span>
            <h1>TÍTULO</h1>
            <p>Uma frase curta que resume o deck.</p>
        </div>
    </section>

    <!-- SLIDE EXEMPLO 1: batimento perpétuo (substitua pela sua animação) -->
    <section class="slide" data-anim="s1">
        <!-- @MIRA:SIZE 5/10 -->
        <svg class="stage" id="s1-svg" viewBox="155.15 87.27 969.70 545.45" preserveAspectRatio="xMidYMid slice"></svg>
        <div class="slide-head">
            <span class="kicker">01 · Exemplo</span>
            <h2>Nada fica <em>parado</em></h2>
            <p>Todo slide leva uma animação em loop perpétuo.</p>
        </div>
        <button class="replay-btn" data-replay="s1">↻ replay</button>
    </section>

    <!-- SLIDE EXEMPLO 2: o frio vira quente (substitua pela sua animação) -->
    <section class="slide" data-anim="s2">
        <!-- @MIRA:SIZE 5/10 -->
        <svg class="stage" id="s2-svg" viewBox="155.15 87.27 969.70 545.45" preserveAspectRatio="xMidYMid slice"></svg>
        <div class="slide-head">
            <span class="kicker">02 · Exemplo</span>
            <h2>O frio vira <em>quente</em></h2>
            <p>Uma única cor fria, só quando tem sentido.</p>
        </div>
        <button class="replay-btn" data-replay="s2">↻ replay</button>
    </section>

    <script>
        // ===== Paleta: a cor da marca vem do bloco @MIRA:THEME =====
        // Tons quentes derivados da primária dominam. Uma única cor fria (aço)
        // entra só para representar "material bruto / estático / fonte
        // protegida". Sem arco-íris.
        const lerp = (a, b, t) => a + (b - a) * t;
        function toRGB(hex) { const c = hex.replace('#', ''); return [parseInt(c.substr(0,2),16), parseInt(c.substr(2,2),16), parseInt(c.substr(4,2),16)]; }
        function mixHex(h1, h2, t) { const a = toRGB(h1), b = toRGB(h2); return '#' + [0,1,2].map(i => Math.round(lerp(a[i], b[i], t)).toString(16).padStart(2, '0')).join(''); }
        const _cs = getComputedStyle(document.documentElement);
        const _v = (n, fb) => { const v = _cs.getPropertyValue(n).trim(); return /^#[0-9a-fA-F]{6}$/.test(v) ? v : fb; };
        const OR = _v('--mira-primary', '#FF904D');
        const DEEP = _v('--mira-primary-deep', '#FF6B2C');
        const AM = _v('--mira-accent-2', '#FFC766');
        const GOLD = mixHex(OR, AM, 0.5);
        const WHITE = '#ffffff';
        const COLD = '#5E6B82', COLD2 = '#8492ad';
        const PAL = [OR, AM, GOLD, DEEP];
        function rgba(hex, a) {
            const c = hex.replace('#', '');
            return `rgba(${parseInt(c.substr(0,2),16)},${parseInt(c.substr(2,2),16)},${parseInt(c.substr(4,2),16)},${a})`;
        }

        // ===== Infraestrutura: gerações + timers (anti-vazamento de loop) =====
        const ANIM = {};
        const TIMERS = {};
        const GEN = {};
        function stop(key) { (TIMERS[key] || []).forEach(t => t && t.stop && t.stop()); TIMERS[key] = []; }
        function track(key, t) { (TIMERS[key] = TIMERS[key] || []).push(t); return t; }
        function play(key) {
            if (!ANIM[key]) return;
            GEN[key] = (GEN[key] || 0) + 1;
            const svg = d3.select('#' + key + '-svg');
            svg.selectAll('*').interrupt();
            svg.selectAll('*').remove();
            stop(key);
            cineUnder(svg, GEN[key], key);   // clima quente ao fundo
            ANIM[key](svg, GEN[key]);
            cineOver(svg, GEN[key], key);    // vinheta + flash de revelação por cima
        }

        // ===== Helpers compartilhados =====
        const CX = 640, CY = 360;
        const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
        const smooth = (t) => t * t * (3 - 2 * t);
        const pick = (i) => PAL[((i % PAL.length) + PAL.length) % PAL.length];
        function mix(h1, h2, t) { const a = toRGB(h1), b = toRGB(h2); return `rgb(${Math.round(lerp(a[0],b[0],t))},${Math.round(lerp(a[1],b[1],t))},${Math.round(lerp(a[2],b[2],t))})`; }
        function seeded(s) { const x = Math.sin(s * 12.9898 + 78.233) * 43758.5453; return x - Math.floor(x); }

        // ===== Camada cinematográfica compartilhada (envolve TODO slide) =====
        // Dá clima e intensidade ao deck inteiro sem tocar cada animação:
        // brasas quentes ao fundo + vinheta de cinema + flash de revelação na
        // entrada. Slides que precisam de um campo limpo entram em NOEMBERS.
        const NOEMBERS = {};
        function cineUnder(svg, gen, key) {
            if (NOEMBERS[key]) return;
            const g = svg.append('g').style('pointer-events', 'none');
            const N = 26;
            const emb = d3.range(N).map(i => ({ x: 200 + seeded(i * 1.7) * 880, sp: 0.006 + seeded(i + 7) * 0.02, r: 1 + seeded(i + 2) * 2.4, c: pick(i), drift: seeded(i + 5) * 6.28 }));
            const sel = g.selectAll('circle').data(emb).join('circle').attr('r', d => d.r).attr('fill', d => d.c).style('filter', d => `drop-shadow(0 0 5px ${d.c})`);
            track(key, d3.timer((el) => {
                if (gen !== GEN[key]) return;
                sel.attr('cx', d => d.x + Math.sin(el * 0.0008 + d.drift) * 26)
                   .attr('cy', d => 640 - ((el * d.sp + d.drift * 60) % 640))
                   .attr('opacity', d => { const p = ((el * d.sp + d.drift * 60) % 640) / 640; return (0.1 + Math.sin(p * Math.PI) * 0.32); });
            }));
        }
        function cineOver(svg, gen, key) {
            const defs = svg.append('defs');
            const rg = defs.append('radialGradient').attr('id', key + '-vig').attr('cx', '50%').attr('cy', '47%').attr('r', '62%');
            rg.append('stop').attr('offset', '60%').attr('stop-color', 'rgba(0,0,0,0)');
            rg.append('stop').attr('offset', '100%').attr('stop-color', 'rgba(0,0,0,0.52)');
            svg.append('rect').attr('x', 155).attr('y', 87).attr('width', 971).attr('height', 546).attr('fill', `url(#${key}-vig)`).style('pointer-events', 'none');
            // flash de revelação: um clarão quente floresce e some (entrada cinematográfica)
            svg.append('circle').attr('cx', CX).attr('cy', CY).attr('r', 70).attr('fill', rgba(mixHex(AM, WHITE, 0.3), 0.5))
                .style('pointer-events', 'none').style('mix-blend-mode', 'screen')
                .transition().duration(680).ease(d3.easeCubicOut).attr('r', 760).style('opacity', 0).remove();
        }

        // ============================================================
        // CAPA — assinatura ambiente. Halo quente respira ao centro, brasas
        // orbitam pelas bordas. Loop: brasas circulam para sempre, glow pulsa.
        // ============================================================
        ANIM.s0 = function (svg, gen) {
            svg.append('circle').attr('cx', CX).attr('cy', CY).attr('r', 320)
                .attr('fill', 'none').attr('stroke', rgba(OR, 0.05)).attr('stroke-width', 90)
                .style('filter', 'blur(30px)');
            const N = 60;
            const emb = d3.range(N).map(i => ({
                ang: (i / N) * Math.PI * 2, rad: 250 + seeded(i) * 260,
                sp: 0.00008 + seeded(i + 9) * 0.00016, r: 1.3 + seeded(i + 3) * 3.4,
                c: pick(i), ph: seeded(i + 5) * 6.28
            }));
            const g = svg.append('g');
            const sel = g.selectAll('circle').data(emb).join('circle')
                .attr('r', d => d.r).attr('fill', d => d.c)
                .style('filter', d => `drop-shadow(0 0 6px ${d.c})`);
            const halo = svg.insert('circle', ':first-child').attr('cx', CX).attr('cy', CY)
                .attr('r', 150).attr('fill', 'none').attr('stroke', rgba(AM, 0.16)).attr('stroke-width', 2);
            track('s0', d3.timer((el) => {
                if (gen !== GEN.s0) return;
                sel.attr('cx', d => CX + Math.cos(d.ph + el * d.sp) * d.rad)
                   .attr('cy', d => CY + Math.sin(d.ph + el * d.sp) * d.rad * 0.6)
                   .attr('fill-opacity', d => 0.4 + Math.sin(el * 0.001 + d.ph) * 0.35);
                halo.attr('r', 150 + Math.sin(el * 0.0016) * 30).attr('stroke-opacity', 0.1 + Math.sin(el * 0.0016) * 0.08);
            }));
        };

        // ============================================================
        // EXEMPLO 1 — BATIMENTO. A linha reta ganha vida e vira um pulso da
        // cor da marca que bate para sempre, com anel de pulso a cada batida.
        // ============================================================
        ANIM.s1 = function (svg, gen) {
            const cx = CX, mid = CY + 40, x0 = 300, x1 = 980, period = 176, speed = 0.16;
            svg.append('line').attr('x1', x0).attr('y1', mid).attr('x2', x1).attr('y2', mid).attr('stroke', rgba(WHITE, 0.1)).attr('stroke-width', 1);
            const wave = svg.append('path').attr('fill', 'none').attr('stroke', OR).attr('stroke-width', 3.4)
                .attr('stroke-linecap', 'round').attr('stroke-linejoin', 'round').style('filter', `drop-shadow(0 0 9px ${OR})`);
            const dot = svg.append('circle').attr('r', 5).attr('fill', WHITE).style('filter', `drop-shadow(0 0 11px ${OR})`);
            const ringsG = svg.append('g');
            function beat(u) {
                const d = u - period * 0.5;
                let y = 0;
                y += Math.exp(-(d * d) / 40) * -74;
                y += Math.exp(-((d - 10) * (d - 10)) / 18) * 34;
                y += Math.exp(-((d + 12) * (d + 12)) / 24) * 12;
                y += Math.sin(u * 0.13) * 2.5;
                return y;
            }
            track('s1', d3.interval(() => {
                if (gen !== GEN.s1) return;
                ringsG.append('circle').attr('cx', cx).attr('cy', mid).attr('r', 8).attr('fill', 'none').attr('stroke', OR).attr('stroke-width', 2.5).attr('opacity', 0.7)
                    .transition().duration(900).ease(d3.easeCubicOut).attr('r', 86).attr('opacity', 0).remove();
            }, period / speed));
            track('s1', d3.timer(el => {
                if (gen !== GEN.s1) return;
                const intro = clamp(el / 700, 0, 1), shift = el * speed;
                let dd = '';
                for (let x = x0; x <= x1; x += 4) {
                    const u = ((x + shift) % period + period) % period;
                    dd += (x === x0 ? 'M' : 'L') + x.toFixed(1) + ',' + (mid + beat(u) * intro).toFixed(1);
                }
                wave.attr('d', dd);
                const uu = ((cx + shift) % period + period) % period;
                dot.attr('cx', cx).attr('cy', mid + beat(uu) * intro);
            }));
        };

        // ============================================================
        // EXEMPLO 2 — A PONTE. Documentos frios e estáticos atravessam uma
        // lente quente e saem como cards vivos que respiram. Demonstra a regra
        // da paleta: o frio (aço) só existe para virar quente.
        // ============================================================
        ANIM.s2 = function (svg, gen) {
            const cx = CX, cy = CY + 40;
            const docsG = svg.append('g');
            const lens = svg.append('g');
            lens.append('circle').attr('cx', cx).attr('cy', cy).attr('r', 74).attr('fill', 'none')
                .attr('stroke', OR).attr('stroke-width', 4).style('filter', `drop-shadow(0 0 20px ${OR})`);
            lens.append('circle').attr('cx', cx).attr('cy', cy).attr('r', 56).attr('fill', 'none')
                .attr('stroke', rgba(AM, 0.6)).attr('stroke-width', 2).attr('stroke-dasharray', '3 7');
            const pupil = lens.append('circle').attr('cx', cx).attr('cy', cy).attr('r', 20).attr('fill', '#0a0a0a')
                .attr('stroke', WHITE).attr('stroke-width', 1.6).style('filter', `drop-shadow(0 0 12px ${OR})`);

            let docs = [], seedn = 0;
            for (let i = 0; i < 4; i++) docs.push({ id: ++seedn, p: i * 0.24, lane: (seeded(i) - 0.5) * 96, sp: 0.0023 + seeded(i + 2) * 0.0008 });
            track('s2', d3.interval(() => { if (gen !== GEN.s2) return; if (docs.length < 7) docs.push({ id: ++seedn, p: 0, lane: (seeded(seedn) - 0.5) * 96, sp: 0.0023 + seeded(seedn + 2) * 0.0008 }); }, 850));

            let last = 0;
            track('s2', d3.timer(el => {
                if (gen !== GEN.s2) return;
                const dt = Math.min(3, (el - last) / 16.67 || 1); last = el;
                pupil.attr('r', 20 * (1 + Math.sin(el * 0.002) * 0.12));
                lens.attr('transform', `translate(${cx},${cy}) scale(${1 + Math.sin(el * 0.0016) * 0.03}) translate(${-cx},${-cy})`);
                docs.forEach(d => d.p += d.sp * dt);
                docs = docs.filter(d => d.p < 1.08);

                const sel = docsG.selectAll('g.doc').data(docs, d => d.id);
                const ent = sel.enter().append('g').attr('class', 'doc');
                ent.append('rect').attr('class', 'card').attr('rx', 8);
                for (let i = 0; i < 3; i++) ent.append('rect').attr('class', 'ln ln' + i).attr('rx', 2);
                ent.merge(sel).each(function (d) {
                    const g = d3.select(this);
                    const x = lerp(300, 980, d.p);
                    const warm = clamp((d.p - 0.44) / 0.15, 0, 1);
                    const alive = clamp((d.p - 0.6) / 0.2, 0, 1);
                    const breathe = 1 + alive * Math.sin(el * 0.006 + d.id) * 0.06;
                    const fade = d.p < 0.06 ? d.p / 0.06 : (d.p > 0.9 ? 1 - (d.p - 0.9) / 0.18 : 1);
                    const w = 72 * breathe, h = 92 * breathe;
                    g.attr('transform', `translate(${x},${cy + d.lane})`).attr('opacity', clamp(fade, 0, 1));
                    g.select('.card').attr('x', -w / 2).attr('y', -h / 2).attr('width', w).attr('height', h)
                        .attr('fill', mix(COLD, OR, warm)).attr('fill-opacity', 0.12 + warm * 0.14)
                        .attr('stroke', mix(COLD2, OR, warm)).attr('stroke-opacity', 0.5 + warm * 0.4).attr('stroke-width', 1.6)
                        .style('filter', alive > 0.02 ? `drop-shadow(0 0 ${alive * 16}px ${OR})` : 'none');
                    g.selectAll('.ln').each(function (_, i) {
                        const lw = (i === 2 ? 0.55 : 0.78) * w;
                        d3.select(this).attr('x', -w / 2 + w * 0.14).attr('y', -h / 2 + h * (0.24 + i * 0.22)).attr('width', lw).attr('height', 6 * breathe)
                            .attr('fill', mix(COLD2, AM, warm)).attr('fill-opacity', 0.7);
                    });
                });
                sel.exit().remove();
            }));
        };

        // ===== Disparo por viewport + Replay =====
        Object.keys(ANIM).forEach(k => GEN[k] = 0);
        const io = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                const k = e.target.getAttribute('data-anim');
                if (e.isIntersecting && k) play(k);
            });
        }, { threshold: 0.4 });
        document.querySelectorAll('section[data-anim]').forEach(s => io.observe(s));
        document.querySelectorAll('[data-replay]').forEach(b => b.addEventListener('click', () => play(b.getAttribute('data-replay'))));

        // ===== Navegação seção a seção (progresso + botão + teclado) =====
        (function () {
            const sections = Array.from(document.querySelectorAll('body > section'));
            if (!sections.length) return;
            const progress = document.getElementById('mira-progress');
            const nextBtn = document.getElementById('mira-next');
            const atBottom = () => (window.scrollY + window.innerHeight) >= (document.documentElement.scrollHeight - 100);
            function currentIndex() {
                const y = window.scrollY + window.innerHeight * 0.4;
                let idx = 0;
                for (let i = 0; i < sections.length; i++) if (sections[i].offsetTop <= y) idx = i;
                return idx;
            }
            function goTo(i) {
                const idx = Math.max(0, Math.min(sections.length - 1, i));
                sections[idx].scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            window.addEventListener('scroll', () => {
                const docH = document.documentElement.scrollHeight - window.innerHeight;
                progress.style.width = (docH > 0 ? (window.scrollY / docH) * 100 : 0) + '%';
                nextBtn.classList.toggle('visible', window.scrollY > 200);
                nextBtn.classList.toggle('up', atBottom());
            });
            nextBtn.addEventListener('click', () => {
                if (atBottom()) { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
                goTo(currentIndex() + 1);
            });
            document.addEventListener('keydown', (e) => {
                if (['ArrowRight', 'ArrowDown', 'PageDown', ' '].includes(e.key)) { e.preventDefault(); goTo(currentIndex() + 1); }
                else if (['ArrowLeft', 'ArrowUp', 'PageUp'].includes(e.key)) { e.preventDefault(); goTo(currentIndex() - 1); }
                else if (e.key === 'Home') { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
                else if (e.key === 'End') { e.preventDefault(); goTo(sections.length - 1); }
                else if (e.key.toLowerCase() === 'f') { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
            });
        })();
    </script>

    <!-- Modo edição (reordenar slides): tecla E ou ?edit=1 -->
    <script src="mira/mira-edit.js" defer></script>
    <!-- Edição livre estilo Canva (mover/redimensionar/rotacionar/duplicar/excluir/texto): tecla E -->
    <script src="mira/mira-edit-free.js" defer></script>
    <!-- mira-draw (desenhar sobre o slide): tecla P ou ?draw=1 -->
    <script src="mira/mira-draw.js" defer></script>
</body>
