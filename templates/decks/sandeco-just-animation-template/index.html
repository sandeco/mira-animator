<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mira - Template: Sandeco Just Animation Template</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* @MIRA:THEME:START */
/* Tema NEUTRO e theme-agnóstico do template de animação pura.
   Este template é multicor: a cor vive na paleta do bloco JS, nunca numa
   cor única do tema. Por isso o "new" do Mira NÃO injeta tema aqui (mira-dark,
   etc.); mantém este bloco. Não introduza uma cor primária predominante. */
:root {
    --mira-primary: #ffffff;
    --mira-bg: #000000;
    --mira-text: #ffffff;
    --mira-text-soft: rgba(255, 255, 255, 0.72);
    --mira-text-softer: rgba(255, 255, 255, 0.50);
    --mira-accent-2: #d7e3ff;
}

body {
    background: var(--mira-bg);
    min-height: 100vh;
    color: var(--mira-text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
        /* @MIRA:THEME:END */

        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; background: #000; }
        html { scroll-behavior: smooth; }
        /* Scroll discreto (padrao Mira): a navegacao e por teclado/botao e o
           progresso ja aparece na barra do topo; a scrollbar fica quase invisivel. */
        html { scrollbar-width: thin; scrollbar-color: #2e2e2e #0d0d0d; }
        ::-webkit-scrollbar { width: 6px; height: 6px; background: #0d0d0d; }
        ::-webkit-scrollbar-track { background: #0d0d0d; }
        ::-webkit-scrollbar-thumb { background: #2e2e2e; border-radius: 999px; }
        ::-webkit-scrollbar-thumb:hover { background: #4a4a4a; }
        ::-webkit-scrollbar-button { display: none; width: 0; height: 0; }
        body { color: #fff; overflow-x: hidden; }

        /* ============================================================
           TEMPLATE DE ANIMAÇÃO PURA (multi-slide)
           Regras (não quebrar ao preencher com o mira-animator):
           1. SEM título, subtítulo, pílulas ou qualquer texto sobreposto.
              Cada slide é só a animação de tela cheia sobre fundo preto.
              Labels mínimos DENTRO do SVG (parte da metáfora) são ok.
           2. Paleta LIVRE multicor, alto contraste com o preto, NENHUMA cor
              predominante. Não travar em var(--mira-primary)/laranja do tema.
           3. Cada palco usa viewBox 5/10 centrado e preserveAspectRatio slice;
              componha o conteúdo centrado em (640,360) ocupando o palco inteiro.
           4. Loop interno perpétuo + anti-vazamento por geração + Replay.
           Para um novo slide: duplique uma <section class="slide"> e registre
           a função em ANIM.sN (o trigger e o replay já acham pelo data-anim).
           ============================================================ */
        .slide {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }
        .stage {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        .replay-btn {
            position: absolute;
            bottom: 22px; right: 22px;
            z-index: 6;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: rgba(255, 255, 255, 0.7);
            border-radius: 9999px;
            padding: 6px 14px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            opacity: 0.5;
        }
        .replay-btn:hover { opacity: 1; color: #fff; }

        /* Passagem de slides: barra de progresso + botão + teclado */
        #mira-progress {
            position: fixed; top: 0; left: 0; height: 3px; width: 0%;
            background: linear-gradient(90deg, #00E5FF, #7CFF6B, #FFD166, #FF5C8A, #B388FF);
            background-size: 200% 100%;
            animation: mira-shimmer 3s linear infinite;
            z-index: 9999; transition: width 0.1s linear;
        }
        @keyframes mira-shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        #mira-next {
            position: fixed; bottom: 32px; left: 32px;
            width: 46px; height: 46px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.12); color: #fff;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0; transform: translateY(20px);
            transition: all 0.3s ease; z-index: 9998;
        }
        #mira-next.visible { opacity: 0.55; transform: translateY(0); }
        #mira-next.visible:hover { opacity: 1; transform: translateY(-3px) scale(1.08); }
        #mira-next svg { transition: transform 0.3s ease; }
        #mira-next.up svg { transform: rotate(180deg); }
    </style>
</head>

<body>
    <div id="mira-progress"></div>
    <button id="mira-next" aria-label="Próximo slide">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </button>

    <!-- SLIDE EXEMPLO 1: campo multicor (substitua pela sua animação) -->
    <section class="slide" data-anim="s1">
        <!-- @MIRA:SIZE 5/10 -->
        <svg class="stage" id="s1-svg" viewBox="155.15 87.27 969.70 545.45" preserveAspectRatio="xMidYMid slice"></svg>
        <button class="replay-btn" data-replay="s1">↻ replay</button>
    </section>

    <!-- SLIDE EXEMPLO 2: órbita pulsante (substitua pela sua animação) -->
    <section class="slide" data-anim="s2">
        <!-- @MIRA:SIZE 5/10 -->
        <svg class="stage" id="s2-svg" viewBox="155.15 87.27 969.70 545.45" preserveAspectRatio="xMidYMid slice"></svg>
        <button class="replay-btn" data-replay="s2">↻ replay</button>
    </section>

    <script>
        // Paleta LIVRE multicor (alto contraste com preto, nenhuma cor predominante).
        // A cor do template vive aqui, não no tema. Distribua estas cores entre os elementos.
        const CY = '#00E5FF', GR = '#7CFF6B', YE = '#FFD166', PK = '#FF5C8A', PU = '#B388FF', OR = '#FF904D', WHITE = '#ffffff';
        const PAL = [CY, GR, YE, PK, PU, OR];
        function rgba(hex, a) {
            const c = hex.replace('#', '');
            return `rgba(${parseInt(c.substr(0,2),16)},${parseInt(c.substr(2,2),16)},${parseInt(c.substr(4,2),16)},${a})`;
        }

        // ===== Infraestrutura: gerações + timers (anti-vazamento de loop) =====
        const ANIM = {};
        const TIMERS = {};
        const GEN = {};
        function stop(key) { (TIMERS[key] || []).forEach(t => t && t.stop && t.stop()); TIMERS[key] = []; }
        function track(key, t) { (TIMERS[key] = TIMERS[key] || []).push(t); return t; }
        function play(key) {
            if (!ANIM[key]) return;
            GEN[key] = (GEN[key] || 0) + 1;
            const svg = d3.select('#' + key + '-svg');
            svg.selectAll('*').interrupt();
            svg.selectAll('*').remove();
            stop(key);
            ANIM[key](svg, GEN[key]);
        }

        // ===== EXEMPLO 1: campo multicor centrado (entrada + órbita perpétua) =====
        ANIM.s1 = function (svg, gen) {
            const cx = 640, cy = 360, N = 46;
            const nodes = d3.range(N).map((d, i) => {
                const ang = (i / N) * Math.PI * 2, rad = 120 + Math.random() * 230;
                return { baseX: cx + Math.cos(ang) * rad, baseY: cy + Math.sin(ang) * rad * 0.62, orbit: 14 + Math.random() * 70, speed: 0.0006 + Math.random() * 0.0018, phase: Math.random() * Math.PI * 2, r: 2.2 + Math.random() * 4.6, c: PAL[i % PAL.length] };
            });
            const links = d3.range(N).map(i => ({ s: nodes[i], t: nodes[(i + 5) % N], c: PAL[(i + 2) % PAL.length] }));
            const lg = svg.append('g').selectAll('line').data(links).join('line').attr('stroke', d => d.c).attr('stroke-width', 1).attr('stroke-opacity', 0.3);
            const fg = svg.append('g').selectAll('circle').data(nodes).join('circle').attr('r', d => d.r).attr('fill', d => d.c).attr('fill-opacity', 0).style('filter', d => `drop-shadow(0 0 8px ${d.c})`);
            fg.transition().duration(900).attr('fill-opacity', 0.9);
            track('s1', d3.timer((el) => {
                if (gen !== GEN.s1) return;
                nodes.forEach((node, i) => {
                    const a = node.phase + el * node.speed, drift = Math.sin(el * 0.00045 + i) * 16;
                    node.x = node.baseX + Math.cos(a) * node.orbit + drift;
                    node.y = node.baseY + Math.sin(a * 1.4) * node.orbit * 0.72;
                });
                fg.attr('cx', d => d.x).attr('cy', d => d.y).attr('r', (d, i) => d.r * (1 + Math.sin(el * 0.003 + i) * 0.22));
                lg.attr('x1', d => d.s.x).attr('y1', d => d.s.y).attr('x2', d => d.t.x).attr('y2', d => d.t.y)
                  .attr('stroke-opacity', (d, i) => 0.16 + Math.sin(el * 0.001 + i) * 0.12);
            }));
        };

        // ===== EXEMPLO 2: órbita pulsante centrada (satélites multicor + pulsos) =====
        ANIM.s2 = function (svg, gen) {
            const cx = 640, cy = 360, R = 210, n = 6;
            svg.append('circle').attr('cx', cx).attr('cy', cy).attr('r', R).attr('fill', 'none').attr('stroke', 'rgba(255,255,255,0.12)').attr('stroke-dasharray', '4 8');
            svg.append('circle').attr('cx', cx).attr('cy', cy).attr('r', 0).attr('fill', 'rgba(255,255,255,0.06)').attr('stroke', WHITE).attr('stroke-width', 2.5)
                .transition().duration(700).ease(d3.easeBackOut).attr('r', 46);
            const sats = d3.range(n).map(i => ({ c: PAL[i], phase: (i / n) * Math.PI * 2 }));
            const sel = svg.append('g').selectAll('circle').data(sats).join('circle').attr('r', 0).attr('fill', d => d.c).style('filter', d => `drop-shadow(0 0 10px ${d.c})`);
            sel.transition().delay((d, i) => 300 + i * 110).duration(450).ease(d3.easeBackOut).attr('r', 13);
            let bi = 0;
            track('s2', d3.interval(() => {
                if (gen !== GEN.s2) return;
                const c = PAL[bi % n]; bi++;
                svg.append('circle').attr('cx', cx).attr('cy', cy).attr('r', 46).attr('fill', 'none').attr('stroke', c).attr('stroke-width', 3).attr('opacity', 0.7)
                    .transition().duration(1400).ease(d3.easeCubicOut).attr('r', R).attr('opacity', 0).remove();
            }, 1500));
            const per = 9000;
            track('s2', d3.timer((el) => {
                if (gen !== GEN.s2) return;
                const base = el / per * Math.PI * 2;
                sel.attr('cx', d => cx + Math.cos(d.phase + base) * R).attr('cy', d => cy + Math.sin(d.phase + base) * R * 0.62);
            }));
        };

        // ===== Disparo por viewport + Replay =====
        Object.keys(ANIM).forEach(k => GEN[k] = 0);
        const io = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                const k = e.target.getAttribute('data-anim');
                if (e.isIntersecting && k) play(k);
            });
        }, { threshold: 0.4 });
        document.querySelectorAll('section[data-anim]').forEach(s => io.observe(s));
        document.querySelectorAll('[data-replay]').forEach(b => b.addEventListener('click', () => play(b.getAttribute('data-replay'))));

        // ===== Navegação seção a seção (progresso + botão + teclado) =====
        (function () {
            const sections = Array.from(document.querySelectorAll('body > section'));
            if (!sections.length) return;
            const progress = document.getElementById('mira-progress');
            const nextBtn = document.getElementById('mira-next');
            const atBottom = () => (window.scrollY + window.innerHeight) >= (document.documentElement.scrollHeight - 100);
            function currentIndex() {
                const y = window.scrollY + window.innerHeight * 0.4;
                let idx = 0;
                for (let i = 0; i < sections.length; i++) if (sections[i].offsetTop <= y) idx = i;
                return idx;
            }
            function goTo(i) {
                const idx = Math.max(0, Math.min(sections.length - 1, i));
                sections[idx].scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            window.addEventListener('scroll', () => {
                const docH = document.documentElement.scrollHeight - window.innerHeight;
                progress.style.width = (docH > 0 ? (window.scrollY / docH) * 100 : 0) + '%';
                nextBtn.classList.toggle('visible', window.scrollY > 200);
                nextBtn.classList.toggle('up', atBottom());
            });
            nextBtn.addEventListener('click', () => {
                if (atBottom()) { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
                goTo(currentIndex() + 1);
            });
            document.addEventListener('keydown', (e) => {
                if (['ArrowRight', 'ArrowDown', 'PageDown', ' '].includes(e.key)) { e.preventDefault(); goTo(currentIndex() + 1); }
                else if (['ArrowLeft', 'ArrowUp', 'PageUp'].includes(e.key)) { e.preventDefault(); goTo(currentIndex() - 1); }
                else if (e.key === 'Home') { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
                else if (e.key === 'End') { e.preventDefault(); goTo(sections.length - 1); }
                else if (e.key.toLowerCase() === 'f') { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
            });
        })();
    </script>

    <!-- Modo edição (reordenar slides): tecla E ou ?edit=1 -->
    <script src="mira/mira-edit.js" defer></script>
    <!-- mira-draw (desenhar sobre o slide): tecla P ou ?draw=1 -->
    <script src="mira/mira-draw.js" defer></script>
    <!-- mira-tactics (quadro tatico, pecas arrastaveis): tecla T ou ?tactics=1 -->
    <script src="mira/mira-tactics.js" defer></script>
</body>

</html>
