<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Mira · apresentar com o celular</title>
    <!-- =================================================================
         mira-remote.html  ·  Shell do espelhamento (specs/remote-control)
         -----------------------------------------------------------------
         Servida em "/" pelo mira-remote-server.cjs para TODOS os aparelhos.
         O deck de verdade roda num iframe de exatamente 1280x720 (o palco
         16:9 da spec), escalado para caber na tela: a geometria do slide é
         idêntica em qualquer aparelho. A UI do remote (status, QR, botões,
         desenho) vive fora do palco, em tamanho nativo da tela.
         ================================================================= -->
    <style>
        :root { --orange: #FF904D; --green: #35D07F; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; }
        body {
            font-family: Inter, -apple-system, system-ui, "Segoe UI", sans-serif;
            background: #000; color: #eef1f7; overflow: hidden; height: 100dvh;
        }

        /* palco 16:9 fixo (1280x720) escalado para caber (RF-06) */
        .stage {
            position: fixed; left: 50%; top: 50%; width: 1280px; height: 720px;
            transform: translate(-50%, -50%) scale(var(--s, 1));
            background: #000;
        }
        .stage iframe { width: 1280px; height: 720px; border: 0; display: block; background: #fff; }

        /* UI do remote: acima do canvas de desenho (fica clicável mesmo desenhando) */
        .status {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100005;
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 14px; font-size: 13px; color: #9aa4b8; pointer-events: none;
        }
        .status .pill {
            display: flex; align-items: center; gap: 8px; pointer-events: auto;
            background: rgba(10, 12, 18, .72); border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 999px; padding: 6px 12px; backdrop-filter: blur(10px);
        }
        /* título da apresentação (o <title> do deck), centralizado no header */
        .status .title {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            max-width: 46vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            font-weight: 800; font-size: 14px; letter-spacing: .04em; text-transform: uppercase;
            color: var(--orange);
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #556; flex: none; }
        .dot.on { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .status button {
            border: 0; background: transparent; color: #9aa4b8; font-size: 16px;
            cursor: pointer; padding: 2px 6px; border-radius: 8px; line-height: 1;
        }
        .status button:active { transform: scale(.92); }
        .status button.on { color: #101010; background: var(--orange); }
        /* No palco (notebook/telão) a apresentação fica limpa: nada de barra.
           Só o QR aparece (RF-02/03); status e controles são coisa de celular. */
        body.role-stage .status { display: none; }

        /* barra de controle (celular): só setas redondas nas pontas do rodapé */
        .bar {
            position: fixed; bottom: 22px; left: 0; right: 0; z-index: 100005;
            display: none; justify-content: space-between; align-items: center;
            padding: 0 22px; pointer-events: none;   /* o meio deixa o palco livre */
        }
        body.role-control .bar { display: flex; }
        body.md-on .bar { display: none; }   /* desenhando: some para não disputar o rodapé */
        .bar button {
            pointer-events: auto;
            width: 68px; height: 68px; padding: 0; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; font-weight: 700; line-height: 1; color: #fff; cursor: pointer;
            background: rgba(255, 255, 255, .10); border: 1px solid rgba(255, 255, 255, .16);
            backdrop-filter: blur(8px);
        }
        .bar button:active { transform: scale(.92); }
        .bar #next { background: var(--orange); border-color: transparent; color: #1a1206; }

        /* QR de conexão (só no palco): canto inferior direito, discreto (RF-02/03) */
        .qr {
            position: fixed; right: 18px; bottom: 18px; z-index: 100006;
            display: none; flex-direction: column; align-items: center; gap: 8px;
            background: #fff; border-radius: 14px; padding: 12px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, .55); text-align: center;
        }
        body.qr-visible .qr { display: flex; }
        .qr img { width: 168px; height: 168px; display: block; }
        .qr .url { font: 700 13px/1.2 Consolas, monospace; color: #1a1206; word-break: break-all; max-width: 190px; }
        .qr .label { font-size: 11px; color: #6b7488; max-width: 190px; }
        .qr .label b { color: #c2410c; }

        /* tela baixa (celular deitado): tudo compacto, sem tampar o slide (RF-10) */
        @media (max-height: 520px) {
            .status { padding: 6px 10px; }
            .status .title { font-size: 12px; max-width: 34vw; }
            .bar { bottom: 10px; padding: 0 14px; }
            .bar button { width: 54px; height: 54px; font-size: 24px; }
            .qr img { width: 120px; height: 120px; }
        }
    </style>
</head>

<body>
    <div class="stage"><iframe id="deck" src="/index.html?stage=1"></iframe></div>

    <div class="status">
        <div class="pill"><span class="dot" id="dot"></span><span id="conn">conectando…</span></div>
        <div class="title" id="deck-title"></div>
        <div class="pill">
            <span id="clients"></span>
            <button id="pen" title="Desenhar (P)">✎</button>
            <button id="fs" title="Tela cheia">⛶</button>
        </div>
    </div>

    <div class="bar">
        <button id="prev" title="Voltar" aria-label="Voltar">←</button>
        <button id="next" title="Avançar" aria-label="Avançar">→</button>
    </div>

    <div class="qr">
        <img id="qr-img" src="/__mira_remote/qr.svg" alt="QR para conectar o celular">
        <div class="url" id="qr-url"></div>
        <div class="label">aponte a câmera do celular (mesma rede/Wi-Fi)<br><b>Q</b> mostra/esconde este QR</div>
    </div>

    <script>
        (function () {
            'use strict';

            /* ---------- escala do palco (RF-06): 1280x720 cabe em qualquer tela -- */
            function xf() {
                var s = Math.min(innerWidth / 1280, innerHeight / 720);
                return { s: s, ox: (innerWidth - 1280 * s) / 2, oy: (innerHeight - 720 * s) / 2 };
            }
            function fit() { document.documentElement.style.setProperty('--s', xf().s); }
            addEventListener('resize', fit);
            fit();

            /* ---------- papel deste aparelho (palco/controle/espelho) ------------ */
            var role = 'mirror';
            var qrForced = false, externals = 0;
            fetch('/__mira_remote/me').then(function (r) { return r.json(); }).then(function (me) {
                role = me.role;
                document.body.classList.add('role-' + role);
                document.getElementById('qr-url').textContent = me.url;
                updateQr();
                var d = document.getElementById('dot');
                if (d.classList.contains('on')) {
                    document.getElementById('conn').textContent = role === 'mirror' ? 'espelho' : 'sincronizado';
                }
            }).catch(function () { });

            function updateQr() {
                var show = role === 'stage' && (externals === 0 || qrForced);
                document.body.classList.toggle('qr-visible', show);
            }

            /* ---------- adaptador do deck (iframe): slide = índice da seção ------ */
            var frame = document.getElementById('deck');
            var deckReady = false, pendingSlide = null;
            var lastSlide = 0, applying = false, applyTarget = -1, applyTimer = 0, settleTimer = 0;

            function win() { return frame.contentWindow; }
            function sections() {
                try {
                    var doc = frame.contentDocument;
                    var list = doc.querySelectorAll('.fullscreen-wrapper');
                    if (list.length < 2) { var s2 = doc.querySelectorAll('body > section'); if (s2.length) list = s2; }
                    return list.length ? Array.prototype.slice.call(list) : [doc.body];
                } catch (e) { return []; }
            }
            function getIdx() {
                try {
                    var secs = sections(), w = win();
                    var y = w.scrollY + w.innerHeight * 0.3, idx = 0;
                    for (var i = 0; i < secs.length; i++) if (secs[i].offsetTop <= y) idx = i;
                    return idx;
                } catch (e) { return 0; }
            }
            function goTo(i) {
                var secs = sections();
                if (!secs.length) return;
                var idx = Math.max(0, Math.min(secs.length - 1, i));
                secs[idx].scrollIntoView({ behavior: 'smooth', block: 'start' });
                // Em celular a primeira rolagem suave às vezes não anda (o deck
                // fica no slide antigo e o eco do servidor não corrige, porque
                // lastSlide já aponta para o alvo). Confere e força se preciso.
                setTimeout(function () {
                    if (getIdx() !== idx) {
                        try { win().scrollTo(0, secs[idx].offsetTop); } catch (e) { }
                    }
                }, 700);
            }
            function applySlide(slide) {
                if (!deckReady) { pendingSlide = slide; return; }
                if (slide === getIdx()) { lastSlide = slide; return; }
                resetDraw(false);   // trocou de slide: caneta desliga e o risco some
                applying = true; applyTarget = slide;
                clearTimeout(applyTimer);
                applyTimer = setTimeout(function () { applying = false; }, 2000);
                goTo(slide);
            }

            // ação local (botão/tecla): aplica E publica na hora (latência baixa)
            function step(delta) {
                if (role === 'mirror') return;   // espelho só acompanha (RF-08)
                var target = getIdx() + delta;
                var secs = sections();
                target = Math.max(0, Math.min(secs.length - 1, target));
                if (target === getIdx()) return;
                resetDraw(true);    // quem muda o slide publica também a limpeza do risco
                applying = true; applyTarget = target;
                clearTimeout(applyTimer);
                applyTimer = setTimeout(function () { applying = false; }, 2000);
                lastSlide = target;
                goTo(target);
                postState(target);
            }

            // scroll orgânico dentro do deck (toque, teclado do próprio deck):
            // espera assentar e publica se o slide mudou
            function onDeckScroll() {
                clearTimeout(settleTimer);
                settleTimer = setTimeout(function () {
                    var idx = getIdx();
                    if (applying && idx === applyTarget) { applying = false; lastSlide = idx; return; }
                    if (applying) return;
                    if (idx !== lastSlide) { lastSlide = idx; resetDraw(true); postState(idx); }
                }, 250);
            }

            frame.addEventListener('load', function () {
                deckReady = true;
                try {
                    var t = frame.contentDocument.title || '';
                    document.getElementById('deck-title').textContent = t;
                    if (t) document.title = t + ' · Mira remote';
                } catch (e) { }
                try {
                    win().addEventListener('scroll', onDeckScroll);
                    // teclas apertadas com o foco dentro do deck chegam à shell
                    frame.contentDocument.addEventListener('keydown', function (e) {
                        var k = e.key;
                        if (k === 'p' || k === 'P' || k === 'q' || k === 'Q' || k === 'Escape' ||
                            ((e.ctrlKey || e.metaKey) && (k === 'z' || k === 'Z'))) {
                            document.dispatchEvent(new KeyboardEvent('keydown', {
                                key: k, ctrlKey: e.ctrlKey, metaKey: e.metaKey
                            }));
                        }
                    });
                } catch (e) { }
                if (pendingSlide !== null) { var p = pendingSlide; pendingSlide = null; applySlide(p); }
            });

            /* ---------- canal: SSE desce, POST sobe ------------------------------ */
            var lastTs = -1;
            function postState(slide) {
                fetch('/state', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ slide: slide, reveal: 0 }),
                }).catch(function () { });
            }

            var dot = document.getElementById('dot');
            var conn = document.getElementById('conn');
            var es = new EventSource('/events');
            es.onopen = function () { dot.classList.add('on'); conn.textContent = role === 'mirror' ? 'espelho' : 'sincronizado'; };
            es.onerror = function () { dot.classList.remove('on'); conn.textContent = 'reconectando…'; };
            es.onmessage = function (ev) {
                var st;
                try { st = JSON.parse(ev.data); } catch (e) { return; }
                if (typeof st.ts === 'number') {
                    if (st.ts < lastTs) return;   // mensagem mais velha que a atual (RP-05)
                    lastTs = st.ts;
                }
                document.getElementById('clients').textContent =
                    st.clients + ' aparelho' + (st.clients === 1 ? '' : 's');
                if (typeof st.externals === 'number' && st.externals !== externals) {
                    if (externals === 0 && st.externals > 0) qrForced = false; // RF-03: some ao entrar o 1º
                    externals = st.externals;
                    updateQr();
                }
                // desenho antes do slide: se o slide mudou, o resetDraw limpa por último
                if (st.draw && window.__applyRemoteDraw) window.__applyRemoteDraw(st.draw);
                if (typeof st.slide === 'number' && st.slide !== lastSlide) applySlide(st.slide);
                if (st.tactics) { lastTacticsBag = st.tactics; applyTactics(st.tactics); }
            };

            /* ---------- entradas -------------------------------------------------- */
            document.getElementById('next').onclick = function () { step(1); };
            document.getElementById('prev').onclick = function () { step(-1); };
            addEventListener('keydown', function (e) {
                if (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
                if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); step(1); }
                else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') { e.preventDefault(); step(-1); }
                else if ((e.key === 'q' || e.key === 'Q') && !e.ctrlKey && !e.metaKey) {
                    // RF-03: com aparelho conectado o QR some; Q reabre (e fecha).
                    // Q, e não C: C é do espelhamento da câmera dentro do deck.
                    if (role === 'stage') { qrForced = !qrForced; updateQr(); }
                }
            });

            /* ---------- tela cheia + paisagem (some onde não dá, NG-05) ---------- */
            var fsBtn = document.getElementById('fs');
            if (!document.documentElement.requestFullscreen) fsBtn.style.display = 'none';
            fsBtn.onclick = function () {
                if (document.fullscreenElement) { document.exitFullscreen(); return; }
                document.documentElement.requestFullscreen().then(function () {
                    try { screen.orientation.lock('landscape').catch(function () { }); } catch (e) { }
                }).catch(function () { });
            };
            document.addEventListener('fullscreenchange', function () {
                fsBtn.textContent = document.fullscreenElement ? '✕' : '⛶';
            });

            /* ---------- desenho: botão ✎ liga o telestrator da shell -------------- */
            var penBtn = document.getElementById('pen');
            penBtn.onclick = function () {
                document.dispatchEvent(new KeyboardEvent('keydown', { key: 'p' }));
            };
            var mo = new MutationObserver(function () {
                penBtn.classList.toggle('on', document.body.classList.contains('md-on'));
            });
            mo.observe(document.body, { attributes: true, attributeFilter: ['class'] });

            /* ---------- sincronização dos traços (coordenadas do palco, RF-07) ---- */
            // publica: pixels da tela -> espaço 1280x720; recebe: o inverso.
            function conv(sh, dir) {
                var t = xf();
                var pt = dir === 'up'
                    ? function (x, y) { return [(x - t.ox) / t.s, (y - t.oy) / t.s]; }
                    : function (x, y) { return [x * t.s + t.ox, y * t.s + t.oy]; };
                var k = dir === 'up' ? 1 / t.s : t.s;
                var c = {};
                for (var key in sh) c[key] = sh[key];
                if (c.points) c.points = c.points.map(function (p) { var q = pt(p.x, p.y); return { x: q[0], y: q[1] }; });
                if (c.x0 != null) { var a = pt(sh.x0, sh.y0), b = pt(sh.x1, sh.y1); c.x0 = a[0]; c.y0 = a[1]; c.x1 = b[0]; c.y1 = b[1]; }
                if (c.x != null) { var d = pt(sh.x, sh.y); c.x = d[0]; c.y = d[1]; }
                if (c.width != null) c.width = sh.width * k;
                if (c.size != null) c.size = sh.size * k;
                return c;
            }
            /* ---------- quadro tático (mira-tactics): peças sincronizadas -------- */
            // Cada quadro expõe window.miraTactics (getState/setState/onchange) e é
            // identificado pelo caminho do arquivo. A shell publica em /tactics com
            // throttle (arrasto ao vivo) e aplica o que chega, sem eco (compara JSON).
            var lastTacticsBag = null;
            var tacticsLast = {}, tacticsTimer = {};
            function tacticsWindows() {
                var out = [];
                try {
                    var dw = frame.contentWindow;
                    if (dw.miraTactics) out.push({ id: dw.location.pathname, win: dw });
                    var ifr = frame.contentDocument.querySelectorAll('iframe');
                    for (var i = 0; i < ifr.length; i++) {
                        var w2 = ifr[i].contentWindow;
                        if (w2 && w2.miraTactics) out.push({ id: w2.location.pathname, win: w2 });
                    }
                } catch (e) { }
                return out;
            }
            function wireTactics() {
                tacticsWindows().forEach(function (t) {
                    if (t.win.__miraRemoteWired) return;
                    t.win.__miraRemoteWired = true;
                    t.win.miraTactics.onchange = function (st) {
                        var json = JSON.stringify(st);
                        if (json === tacticsLast[t.id]) return;
                        tacticsLast[t.id] = json;
                        clearTimeout(tacticsTimer[t.id]);
                        tacticsTimer[t.id] = setTimeout(function () {
                            fetch('/tactics', {
                                method: 'POST', headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ id: t.id, state: JSON.parse(tacticsLast[t.id]) }),
                            }).catch(function () { });
                        }, 90);
                    };
                });
            }
            function applyTactics(bag) {
                tacticsWindows().forEach(function (t) {
                    var st = bag[t.id];
                    if (!st) return;
                    var json = JSON.stringify(st);
                    if (json === tacticsLast[t.id]) return;
                    tacticsLast[t.id] = json;
                    t.win.miraTactics.setState(st);
                });
            }
            // quadros carregam depois do deck (iframe dentro de iframe): revarre e
            // aplica o último estado conhecido até prender todo mundo
            setInterval(function () {
                wireTactics();
                if (lastTacticsBag) applyTactics(lastTacticsBag);
            }, 1000);

            var lastDraw = [];      // último estado em coordenadas do palco
            // trocou de slide: sai do modo desenho e apaga o risco (o telestrator
            // anota o que está na tela agora; slide novo começa limpo)
            function resetDraw(publish) {
                if (!window.miraDraw) return;
                if (document.body.classList.contains('md-on')) {
                    document.dispatchEvent(new KeyboardEvent('keydown', { key: 'p' }));
                }
                if (!lastDraw.length) return;
                lastDraw = [];
                window.miraDraw.setShapes([]);
                if (publish) {
                    fetch('/draw', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '[]',
                    }).catch(function () { });
                }
            }
            function wireDraw() {
                if (!window.miraDraw) return;
                window.miraDraw.onchange = function (shapes) {
                    lastDraw = shapes.map(function (s) { return conv(s, 'up'); });
                    fetch('/draw', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(lastDraw),
                    }).catch(function () { });
                };
                window.__applyRemoteDraw = function (drawArr) {
                    lastDraw = drawArr;
                    window.miraDraw.setShapes(drawArr.map(function (s) { return conv(s, 'down'); }));
                };
                // girar/redimensionar: reaplica os traços na escala nova
                addEventListener('resize', function () {
                    window.miraDraw.setShapes(lastDraw.map(function (s) { return conv(s, 'down'); }));
                });
            }
            if (window.miraDraw) wireDraw();
            else addEventListener('DOMContentLoaded', wireDraw);
        })();
    </script>
    <!-- telestrator da shell (a cópia do deck, com a API de sync) -->
    <script src="/mira/mira-draw.js" defer></script>
</body>

</html>
