<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mira - Enquete em tempo real</title>
<style>
  :root{
    --bg:#15151a; --panel:#1d1d24; --ink:#f4f4f6; --muted:#9a9aa6;
    --orange:#FF904D; --line:#2a2a33;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    overflow:hidden;
  }
  .stage{
    height:100vh; display:grid; grid-template-columns:1fr 520px;
    gap:48px; padding:56px 64px; align-items:center;
  }
  /* ---- ESQUERDA: gráfico ---- */
  .left{height:100%; display:flex; flex-direction:column;}
  .q{font-size:42px; font-weight:700; line-height:1.15; margin-bottom:8px; text-align:center;}
  .live{display:flex; align-items:center; justify-content:center; gap:10px; color:var(--muted); font-size:18px;}
  .dot{width:11px; height:11px; border-radius:50%; background:#39d353; box-shadow:0 0 0 0 rgba(57,211,83,.6); animation:pulse 1.6s infinite;}
  .dot.off{background:#888; animation:none; box-shadow:none;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(57,211,83,.55)}70%{box-shadow:0 0 0 12px rgba(57,211,83,0)}100%{box-shadow:0 0 0 0 rgba(57,211,83,0)}}
  .chartrow{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:34px;}
  .pie-wrap{position:relative; flex:0 0 auto; width:562px; height:562px; perspective:1400px; transform:translateY(-50px);}
  svg{display:block;}
  .pie3d{position:absolute; inset:0; transform-style:preserve-3d; animation:spin3d 36s linear infinite;}
  .pie3d .layer{position:absolute; inset:0; width:100%; height:100%;}
  @keyframes spin3d{from{transform:rotateX(50deg) rotateZ(0deg);}to{transform:rotateX(50deg) rotateZ(360deg);}}
  .center-total{position:absolute; inset:0; z-index:5; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none;}
  .center-total b{font-size:86px; line-height:1; color:var(--ink);}
  .center-total span{font-size:28px; color:var(--muted); margin-top:4px; text-transform:uppercase; letter-spacing:.08em;}
  .legend{display:flex; flex-direction:column; gap:14px; width:300px;}
  .leg{display:flex; align-items:center; gap:14px; font-size:24px;}
  .sw{width:18px; height:18px; border-radius:5px; flex:0 0 auto;}
  .leg .name{flex:1; font-weight:600;}
  .leg .num{color:var(--muted); font-weight:600;}
  .leg .pct{width:64px; text-align:right; font-variant-numeric:tabular-nums;}
  .empty{color:var(--muted); font-size:22px;}
  /* ---- DIREITA: QR ---- */
  .right{
    background:var(--panel); border:1px solid var(--line); border-radius:28px;
    padding:40px 36px 200px; display:flex; flex-direction:column; align-items:center; gap:22px;
    height:100%; justify-content:center;
  }
  .right h2{font-size:39px; font-weight:700; text-align:center;}
  .right p{color:var(--muted); font-size:23px; text-align:center; line-height:1.4;}
  .qr-card{background:#fff; padding:18px; border-radius:20px; line-height:0;}
  .qr-card svg{width:390px; height:390px; display:block;}
  .accent{color:var(--orange);}

/* @MIRA:RESPONSIVE:START */
/* ============================================================
   MIRA — responsive.css  (camada de reflow mobile-first)
   Objetivo: TODO slide 16:9 do Mira vira legível no celular em
   retrato SEM arquivo mobile separado. O mesmo deck se reorganiza:
   fontes encolhem, grids empilham, padding reduz, palcos escalam.

   Estratégia: os decks nascem "desktop-first" (classes Tailwind com
   tamanhos fixos: text-6xl, p-10, ...). Esta camada sobrescreve essas
   classes abaixo de 640px. Usa !important de propósito — precisa
   vencer o Tailwind CDN (injetado em runtime) em decks legados sem
   reescrever o HTML. Os clamps têm teto ~= valor desktop, então em
   telas largas nada muda; só encolhem no estreito.
   ============================================================ */

/* Guarda universal contra overflow horizontal (o "print cortado" no zap). */
html, body { max-width: 100%; overflow-x: hidden; }
img, svg, video, canvas, iframe, table, pre { max-width: 100%; }

@media (max-width: 640px) {

  /* --- Tipografia fluida: encolhe títulos gigantes no celular --- */
  .text-9xl { font-size: clamp(3rem, 12vw, 5rem)      !important; line-height: 1.05 !important; }
  .text-8xl { font-size: clamp(2.75rem, 11vw, 4.5rem) !important; line-height: 1.06 !important; }
  .text-7xl { font-size: clamp(2.25rem, 10vw, 3.75rem)!important; line-height: 1.08 !important; }
  .text-6xl { font-size: clamp(2rem, 9vw, 3rem)       !important; line-height: 1.1  !important; }
  .text-5xl { font-size: clamp(1.75rem, 8vw, 2.5rem)  !important; line-height: 1.12 !important; }
  .text-4xl { font-size: clamp(1.5rem, 7vw, 2rem)     !important; line-height: 1.15 !important; }
  .text-3xl { font-size: clamp(1.35rem, 6vw, 1.75rem) !important; line-height: 1.2  !important; }
  .text-2xl { font-size: clamp(1.2rem, 5vw, 1.5rem)   !important; line-height: 1.25 !important; }
  .text-xl  { font-size: clamp(1.05rem, 4.5vw, 1.25rem)!important; line-height: 1.3 !important; }

  /* Títulos: quebram entre palavras; só partem uma palavra se ela sozinha
     estourar a largura. Sem hyphens:auto — em PT ele hifena no meio
     ("pode-rosas") e fica feio em título de display. */
  h1, h2, h3 { overflow-wrap: break-word; }

  /* --- Espaçamento: paddings de desktop sufocam o celular --- */
  .p-12 { padding: 1.25rem !important; }
  .p-10 { padding: 1.15rem !important; }
  .p-8  { padding: 1.05rem !important; }
  .px-12, .px-10 { padding-left: 1.15rem !important; padding-right: 1.15rem !important; }
  .px-8 { padding-left: 1rem !important; padding-right: 1rem !important; }
  .py-16 { padding-top: 2.5rem !important; padding-bottom: 2.5rem !important; }
  .gap-8 { gap: 1rem !important; }
  .gap-10, .gap-12 { gap: 1.25rem !important; }

  /* --- Layout: seção de slide sempre alcançável pelo topo ---
     min-h-screen + justify-center clipa o topo quando o conteúdo é
     maior que a tela. No celular, ancora no topo e deixa rolar. */
  .min-h-screen {
    min-height: 100dvh !important;
    height: auto !important;
    padding-top: 2rem !important;
    padding-bottom: 2rem !important;
  }
  .min-h-screen.justify-center,
  .min-h-screen.items-center { justify-content: flex-start !important; }

  /* --- Grids/flex de 2+ colunas empilham (redundante ao md: do
         Tailwind, mas cobre grids sem breakpoint declarado). --- */
  .grid-cols-2, .grid-cols-3, .grid-cols-4 { grid-template-columns: 1fr !important; }

  /* --- Palco de animação (D3/SVG/canvas): nunca estoura a largura,
         mantém proporção e encolhe a altura. --- */
  .anim-stage {
    max-width: 100% !important;
    height: auto !important;
    aspect-ratio: 16 / 9;
    min-height: 0 !important;
  }

  /* --- Tabelas: fonte menor + rolagem horizontal se precisar. --- */
  table { font-size: 0.82rem !important; }
  .overflow-x-auto { -webkit-overflow-scrolling: touch; }

  /* --- Controles flutuantes respeitam a safe-area do iPhone. --- */
  #mira-next, #next-card {
    bottom: max(1rem, env(safe-area-inset-bottom)) !important;
    right: max(1rem, env(safe-area-inset-right)) !important;
    width: 44px !important; height: 44px !important;
  }
}
/* @MIRA:RESPONSIVE:END */
</style>
</head>
<body>
  <div class="stage">
    <div class="left">
      <div class="head">
        <div class="q" id="question">Carregando enquete...</div>
        <div class="live"><span class="dot" id="dot"></span><span id="status">conectando...</span></div>
      </div>
      <div class="chartrow">
        <div class="pie-wrap">
          <div class="pie3d" id="pie3d"></div>
          <div class="center-total"><b id="total">0</b><span>votos</span></div>
        </div>
        <div class="legend" id="legend"><div class="empty">Aguardando votos...</div></div>
      </div>
    </div>
    <div class="right">
      <h2>Vote <span class="accent">agora</span></h2>
      <p>Aponte a câmera do celular<br>para o QR-code</p>
      <div class="qr-card">
        <!-- QR gerado localmente (pacote npm qrcode, ECC M) para https://forms.gle/PUWfsmn1gtRQjMme8 -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 29 29" shape-rendering="crispEdges"><path fill="#ffffff" d="M0 0h29v29H0z"/><path stroke="#0a0a0a" d="M0 0.5h7m1 0h3m4 0h2m2 0h2m1 0h7M0 1.5h1m5 0h1m1 0h5m1 0h2m4 0h1m1 0h1m5 0h1M0 2.5h1m1 0h3m1 0h1m4 0h1m1 0h3m2 0h1m1 0h1m1 0h1m1 0h3m1 0h1M0 3.5h1m1 0h3m1 0h1m1 0h3m1 0h1m4 0h1m4 0h1m1 0h3m1 0h1M0 4.5h1m1 0h3m1 0h1m3 0h4m5 0h1m2 0h1m1 0h3m1 0h1M0 5.5h1m5 0h1m2 0h3m2 0h1m1 0h1m1 0h3m1 0h1m5 0h1M0 6.5h7m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h7M8 7.5h1m1 0h1m1 0h3m2 0h3M0 8.5h1m1 0h2m1 0h3m1 0h3m1 0h3m1 0h4m1 0h1m2 0h1m1 0h2M7 9.5h1m3 0h1m5 0h2m1 0h1m1 0h3m3 0h1M3 10.5h4m2 0h1m2 0h1m1 0h1m1 0h1m1 0h1m7 0h2M0 11.5h2m3 0h1m1 0h1m1 0h2m1 0h3m4 0h3m1 0h2m3 0h1M0 12.5h2m1 0h1m2 0h1m1 0h1m1 0h3m2 0h1m1 0h2m1 0h2m3 0h2M2 13.5h2m4 0h1m2 0h1m1 0h1m1 0h4m3 0h1m3 0h3M0 14.5h1m1 0h1m3 0h2m3 0h2m1 0h1m4 0h1m1 0h1m2 0h1m1 0h3M2 15.5h2m4 0h1m1 0h4m1 0h2m4 0h2m1 0h1m2 0h1M0 16.5h5m1 0h4m1 0h1m3 0h1m2 0h1m2 0h1m2 0h2m1 0h1M2 17.5h1m2 0h1m5 0h1m1 0h1m1 0h1m3 0h2m2 0h1m1 0h3M0 18.5h1m1 0h2m1 0h2m1 0h1m2 0h2m2 0h3m2 0h1m2 0h1m2 0h1M2 19.5h1m2 0h1m3 0h1m1 0h2m3 0h4m1 0h2m1 0h1m1 0h1M1 20.5h1m2 0h4m1 0h2m2 0h1m1 0h4m1 0h7M8 21.5h2m1 0h6m3 0h1m3 0h5M0 22.5h7m1 0h1m2 0h3m3 0h4m1 0h1m1 0h2m1 0h1M0 23.5h1m5 0h1m1 0h1m1 0h2m3 0h2m2 0h2m3 0h2m1 0h1M0 24.5h1m1 0h3m1 0h1m2 0h3m2 0h1m5 0h5m1 0h2M0 25.5h1m1 0h3m1 0h1m1 0h1m1 0h1m2 0h9m1 0h3m2 0h1M0 26.5h1m1 0h3m1 0h1m1 0h1m4 0h2m2 0h1m5 0h1m2 0h1m1 0h1M0 27.5h1m5 0h1m4 0h2m2 0h1m2 0h1m1 0h1m1 0h1m2 0h1m1 0h1M0 28.5h7m1 0h1m1 0h1m1 0h2m2 0h5m6 0h1"/></svg>
      </div>
    </div>
  </div>

<script>
  // ===== CONFIG =====
  var SHEET_ID  = "1qAtv9OH2VXaHcieI5F4uI8ebYNUrzngbgSOPkcbMtNE";
  var INTERVALO = 3000; // ms entre leituras
  var PALETTE   = ["#FF904D","#4DC4D9","#7DD957","#FFD24D","#FF6B6B","#5C9DFF","#FF9EC4"];

  // ===== camadas 3D do donut (extrusao por empilhamento) =====
  var LAYERS = 9, DEPTH = 36, layerEls = [];
  (function buildLayers(){
    var pie3d = document.getElementById("pie3d");
    for(var i=0;i<LAYERS;i++){
      var el = document.createElementNS("http://www.w3.org/2000/svg","svg");
      el.setAttribute("viewBox","0 0 300 300");
      el.setAttribute("class","layer");
      el.style.transform = "translateZ(" + (-(i*(DEPTH/(LAYERS-1)))) + "px)";
      el.style.filter = "brightness(" + (1 - 0.55*(i/(LAYERS-1))).toFixed(3) + ")";
      pie3d.appendChild(el);
      layerEls.push(el);
    }
  })();

  var target = {};      // opção -> contagem real
  var displayed = {};   // opção -> valor animado
  var colorMap = {};
  var lastOk = 0;

  // ===== Leitura via gviz (JSONP, sem CORS, funciona por file://) =====
  function poll(){
    var s = document.createElement("script");
    s.src = "https://docs.google.com/spreadsheets/d/" + SHEET_ID +
            "/gviz/tq?tqx=out:json;responseHandler:miraPoll&headers=1&_=" + Date.now();
    s.onerror = function(){ setStatus(false); s.remove(); };
    s.onload  = function(){ s.remove(); };
    document.body.appendChild(s);
  }

  window.miraPoll = function(resp){
    if(!resp || !resp.table){ setStatus(false); return; }
    var cols = resp.table.cols || [];
    var ansIdx = cols.length - 1;               // última coluna = resposta
    if(cols[ansIdx] && cols[ansIdx].label){
      document.getElementById("question").textContent = cols[ansIdx].label;
    }
    var rows = resp.table.rows || [];
    var counts = {};
    for(var i=0;i<rows.length;i++){
      var c = rows[i].c && rows[i].c[ansIdx];
      var v = c && c.v;
      if(v!==null && v!==undefined && v!==""){ counts[v] = (counts[v]||0) + 1; }
    }
    target = counts;
    Object.keys(counts).sort().forEach(function(opt){
      if(!(opt in colorMap)) colorMap[opt] = PALETTE[Object.keys(colorMap).length % PALETTE.length];
      if(!(opt in displayed)) displayed[opt] = 0;
    });
    lastOk = Date.now();
    setStatus(true);
  };

  function setStatus(ok){
    var dot = document.getElementById("dot");
    var st  = document.getElementById("status");
    if(ok){ dot.className = "dot"; st.textContent = "ao vivo"; }
    else  { dot.className = "dot off"; st.textContent = "sem conexao com a planilha"; }
  }

  // ===== Animação + desenho =====
  function tick(){
    var keys = {};
    Object.keys(target).forEach(function(k){keys[k]=1;});
    Object.keys(displayed).forEach(function(k){keys[k]=1;});
    Object.keys(keys).forEach(function(o){
      var t = target[o]||0, d = displayed[o]||0;
      d = d + (t-d)*0.15;
      if(Math.abs(t-d) < 0.01) d = t;
      displayed[o] = d;
    });
    draw();
    requestAnimationFrame(tick);
  }

  function draw(){
    var cx=150, cy=150, r=140, hole=86;
    var opts = Object.keys(displayed).filter(function(o){ return (target[o]||0)>0 || displayed[o]>0.01; });
    var total = opts.reduce(function(s,o){ return s + displayed[o]; }, 0);

    // pizza (donut)
    var svg = "";
    if(total <= 0.0001){
      svg = '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#2a2a33" stroke-width="2"/>';
    } else {
      var ang = -Math.PI/2;
      opts.slice().sort().forEach(function(o){
        var frac = displayed[o]/total;
        if(frac <= 0) return;
        if(frac >= 0.9999){
          svg += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+colorMap[o]+'"/>';
          return;
        }
        var a0=ang, a1=ang+frac*2*Math.PI; ang=a1;
        var x0=cx+r*Math.cos(a0), y0=cy+r*Math.sin(a0);
        var x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
        var large=(a1-a0)>Math.PI?1:0;
        svg += '<path d="M'+cx+' '+cy+' L'+x0.toFixed(2)+' '+y0.toFixed(2)+
               ' A'+r+' '+r+' 0 '+large+' 1 '+x1.toFixed(2)+' '+y1.toFixed(2)+' Z" fill="'+colorMap[o]+'"/>';
      });
    }
    svg += '<circle cx="'+cx+'" cy="'+cy+'" r="'+hole+'" fill="#15151a"/>';
    for(var li=0; li<layerEls.length; li++){ layerEls[li].innerHTML = svg; }
    document.getElementById("total").textContent = Math.round(total);

    // legenda (ordena por contagem desc)
    var leg = document.getElementById("legend");
    var ord = opts.slice().sort(function(a,b){ return (target[b]||0)-(target[a]||0); });
    if(ord.length === 0){
      leg.innerHTML = '<div class="empty">Aguardando votos...</div>';
      return;
    }
    var realTotal = ord.reduce(function(s,o){ return s+(target[o]||0); },0) || 1;
    var html = "";
    ord.forEach(function(o){
      var n = target[o]||0;
      var pct = Math.round(100*n/realTotal);
      html += '<div class="leg">'+
                '<span class="sw" style="background:'+colorMap[o]+'"></span>'+
                '<span class="name">'+escapeHtml(o)+'</span>'+
                '<span class="num">'+n+'</span>'+
                '<span class="pct">'+pct+'%</span>'+
              '</div>';
    });
    leg.innerHTML = html;
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }

  // ===== start =====
  poll();
  setInterval(poll, INTERVALO);
  requestAnimationFrame(tick);
</script>
</body>
</html>
