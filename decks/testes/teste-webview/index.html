<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mira - Teste /mira-webview</title>
<style>
  :root { --mira-primary: #FF904D; --mira-bg: #000; --mira-text: #fff; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #000; }
  html { scroll-behavior: smooth; scroll-snap-type: y mandatory; }
  body { color: #fff; overflow-x: hidden; font-family: system-ui, -apple-system, sans-serif; }
  section { scroll-snap-align: start; }
  .primary-color { color: var(--mira-primary); }

  /* Capa: text-wrap balance escopado so a capa (diretiva de titulo). */
  body > section:first-of-type h1 { text-wrap: balance; }
  .cover { min-height: 100vh; display: flex; flex-direction: column;
           align-items: center; justify-content: center; text-align: center; padding: 24px; gap: 18px; }
  .cover h1 { font-size: clamp(36px, 7vw, 84px); line-height: 1.05; max-width: 14ch; }
  .cover p { color: rgba(255,255,255,.6); font-size: 18px; }

  /* ===== Slide de webview (padrao /mira-webview) ===== */
  .webview-slide { position: relative; width: 100%; height: 100vh; overflow: hidden; background: #000; padding: 0; }
  .webview-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; display: block;
                   background: #fff; pointer-events: none; z-index: 1; }
  .webview-slide.interacting .webview-frame { pointer-events: auto; }
  .webview-fallback { position: absolute; inset: 0; z-index: 0; display: flex; flex-direction: column;
                      align-items: center; justify-content: center; gap: 14px; text-align: center; padding: 32px;
                      color: #fff; background: #0a0a0a; font: 500 18px/1.4 system-ui, sans-serif; }
  .webview-fallback a { color: #FF904D; text-decoration: underline; font-weight: 700; }
  .webview-guard { position: absolute; inset: 0; z-index: 2; display: flex; align-items: flex-end;
                   justify-content: center; padding-bottom: 28px; cursor: pointer; background: transparent;
                   transition: opacity .35s ease; }
  .webview-guard::after { content: ""; position: absolute; inset: 0; pointer-events: none;
                          animation: wv-border 3s ease-in-out infinite; }
  @keyframes wv-border {
    0%,100% { box-shadow: inset 0 0 0 3px rgba(255,144,77,.25), inset 0 0 40px rgba(255,144,77,.10); }
    50%     { box-shadow: inset 0 0 0 3px rgba(255,144,77,.60), inset 0 0 80px rgba(255,144,77,.22); }
  }
  .webview-hint { position: relative; z-index: 1; font: 600 15px/1 system-ui, sans-serif; color: #fff;
                  background: rgba(10,10,10,.72); backdrop-filter: blur(6px);
                  border: 1px solid rgba(255,144,77,.55); border-radius: 999px; padding: 10px 18px;
                  display: inline-flex; align-items: center; gap: 8px; animation: wv-pulse 2.4s ease-in-out infinite; }
  @keyframes wv-pulse {
    0%,100% { transform: translateY(0);    box-shadow: 0 0 0 rgba(255,144,77,0); }
    50%     { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(255,144,77,.35); }
  }
  .webview-slide.interacting .webview-guard { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

  <section class="cover">
    <h1>Um site vivo <span class="primary-color">dentro</span> do slide</h1>
    <p>Role para baixo. No próximo slide o site ocupa a tela inteira.</p>
  </section>

  <section class="webview-slide" id="webview-demo">
    <div class="webview-fallback">
      <p>Este site não permite ser incorporado.</p>
      <p><a href="https://www.globo.com" target="_blank" rel="noopener">Abrir globo.com em nova aba</a></p>
    </div>

    <iframe
      class="webview-frame"
      src="assets/webview/globo/index.html"
      title="globo.com embutido no slide (cópia local, assets ao vivo)"
      loading="eager"
      referrerpolicy="no-referrer-when-downgrade"
      allow="fullscreen; autoplay; encrypted-media; clipboard-read; clipboard-write; geolocation *">
    </iframe>

    <div class="webview-guard" role="button" tabindex="0" aria-label="Clique para navegar no site">
      <span class="webview-hint">Clique para navegar no site &middot; Esc volta ao deck</span>
    </div>
  </section>

  <script>
    (function () {
      var slide = document.getElementById('webview-demo');
      if (!slide) return;
      var guard = slide.querySelector('.webview-guard');
      var frame = slide.querySelector('.webview-frame');
      function enter() { slide.classList.add('interacting'); try { frame.focus(); } catch (e) {} }
      function leave() { slide.classList.remove('interacting'); try { frame.blur(); } catch (e) {} try { window.focus(); } catch (e) {} }
      guard.addEventListener('click', enter);
      guard.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); enter(); }
      });
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape') leave(); });

      /* Ponte de teclado: com o foco DENTRO do iframe, o deck não ouve nada.
         Em iframe same-origin (cópia local), escuta Esc/E/P lá dentro:
         Esc sai da interação; E/P saem e reenviam a tecla para o deck
         (modo edição / pintura continuam funcionando no slide webview). */
      function typingInFrame(doc) {
        var t = doc.activeElement;
        return t && (t.isContentEditable || /^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName));
      }
      function bindFrameKeys() {
        try {
          var doc = frame.contentDocument;
          if (!doc || doc.__mwvKeys) return;
          doc.__mwvKeys = true;
          doc.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') { e.preventDefault(); leave(); return; }
            if (/^[ep]$/i.test(e.key) && !typingInFrame(doc)) {
              e.preventDefault(); e.stopPropagation();
              leave();
              document.dispatchEvent(new KeyboardEvent('keydown', { key: e.key, bubbles: true }));
            }
          }, true);
        } catch (err) { /* site cross-origin: sem ponte (use o fallback local) */ }
      }
      frame.addEventListener('load', bindFrameKeys);
      bindFrameKeys();

      /* Fora da interação, o iframe nunca fica com o foco (sites roubam
         foco no load); devolve o teclado ao deck. */
      window.addEventListener('blur', function () {
        setTimeout(function () {
          if (!slide.classList.contains('interacting') && document.activeElement === frame) {
            try { frame.blur(); } catch (e) {}
            try { window.focus(); } catch (e) {}
          }
        }, 0);
      });
    })();
  </script>

  <!-- Mira: modo edição (E) e pintura (P) — obrigatórios em todo deck -->
  <script defer src="mira/mira-edit.js"></script>
  <script defer src="mira/mira-edit-free.js"></script>
  <script defer src="mira/mira-draw.js"></script>
</body>
</html>
