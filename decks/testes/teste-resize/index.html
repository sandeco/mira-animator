<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Teste — Redimensionar e Crop</title>
    <style>
        /* @MIRA:THEME:START */
        :root {
            --mira-primary: #FF904D;
            --mira-crop: #35D07F;
            --mira-bg: #000000;
            --mira-text: #ffffff;
            --mira-text-soft: rgba(255, 255, 255, 0.70);
            --mira-card-border: rgba(255, 255, 255, 0.10);
        }
        /* @MIRA:THEME:END */
        * { box-sizing: border-box; }
        html, body { margin: 0; background: var(--mira-bg); color: var(--mira-text); font-family: system-ui, sans-serif; }
        section {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4vh;
        }
        body > section:first-of-type h1,
        body > section:first-of-type h2 { text-wrap: balance; }
        h1 { font-size: clamp(1.6rem, 4vw, 3rem); margin: 0; text-align: center; }
        h1 span { color: var(--mira-primary); }
        p.dica { color: var(--mira-text-soft); margin: 0; text-align: center; font-size: clamp(.85rem, 1.4vw, 1.1rem); }

        /* animação contínua: pulso central + dois anéis de órbita */
        #pulso { width: min(46vh, 40vw); height: min(46vh, 40vw); }
        #pulso .anel { transform-origin: 200px 200px; animation: girar 6s linear infinite; }
        #pulso .anel.reverso { animation: girar 9s linear infinite reverse; }
        #pulso .nucleo { transform-origin: 200px 200px; animation: pulsar 1.6s ease-in-out infinite; }
        #pulso .onda { transform-origin: 200px 200px; animation: onda 2.4s ease-out infinite; }
        #pulso .onda.o2 { animation-delay: 1.2s; }
        @keyframes girar { to { transform: rotate(360deg); } }
        @keyframes pulsar { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.25); } }
        @keyframes onda { 0% { transform: scale(.35); opacity: .9; } 100% { transform: scale(1.05); opacity: 0; } }

        /* slide 2: barras dançando (equalizador) */
        #barras rect { transform-origin: center bottom; transform-box: fill-box; animation: dancar 1.1s ease-in-out infinite alternate; }
        #barras .b2 { animation-delay: .2s; }
        #barras .b3 { animation-delay: .4s; }
        #barras .b4 { animation-delay: .6s; }
        @keyframes dancar { from { transform: scaleY(.25); } to { transform: scaleY(1); } }
    
/* @MIRA:RESPONSIVE:START */
/* ============================================================
   MIRA — responsive.css  (camada de reflow mobile-first)
   Objetivo: TODO slide 16:9 do Mira vira legível no celular em
   retrato SEM arquivo mobile separado. O mesmo deck se reorganiza:
   fontes encolhem, grids empilham, padding reduz, palcos escalam.

   Estratégia: os decks nascem "desktop-first" (classes Tailwind com
   tamanhos fixos: text-6xl, p-10, ...). Esta camada sobrescreve essas
   classes abaixo de 640px. Usa !important de propósito — precisa
   vencer o Tailwind CDN (injetado em runtime) em decks legados sem
   reescrever o HTML. Os clamps têm teto ~= valor desktop, então em
   telas largas nada muda; só encolhem no estreito.
   ============================================================ */

/* Guarda universal contra overflow horizontal (o "print cortado" no zap). */
html, body { max-width: 100%; overflow-x: hidden; }
img, svg, video, canvas, iframe, table, pre { max-width: 100%; }

@media (max-width: 640px) {

  /* --- Tipografia fluida: encolhe títulos gigantes no celular --- */
  .text-9xl { font-size: clamp(3rem, 12vw, 5rem)      !important; line-height: 1.05 !important; }
  .text-8xl { font-size: clamp(2.75rem, 11vw, 4.5rem) !important; line-height: 1.06 !important; }
  .text-7xl { font-size: clamp(2.25rem, 10vw, 3.75rem)!important; line-height: 1.08 !important; }
  .text-6xl { font-size: clamp(2rem, 9vw, 3rem)       !important; line-height: 1.1  !important; }
  .text-5xl { font-size: clamp(1.75rem, 8vw, 2.5rem)  !important; line-height: 1.12 !important; }
  .text-4xl { font-size: clamp(1.5rem, 7vw, 2rem)     !important; line-height: 1.15 !important; }
  .text-3xl { font-size: clamp(1.35rem, 6vw, 1.75rem) !important; line-height: 1.2  !important; }
  .text-2xl { font-size: clamp(1.2rem, 5vw, 1.5rem)   !important; line-height: 1.25 !important; }
  .text-xl  { font-size: clamp(1.05rem, 4.5vw, 1.25rem)!important; line-height: 1.3 !important; }

  /* Títulos: quebram entre palavras; só partem uma palavra se ela sozinha
     estourar a largura. Sem hyphens:auto — em PT ele hifena no meio
     ("pode-rosas") e fica feio em título de display. */
  h1, h2, h3 { overflow-wrap: break-word; }

  /* --- Espaçamento: paddings de desktop sufocam o celular --- */
  .p-12 { padding: 1.25rem !important; }
  .p-10 { padding: 1.15rem !important; }
  .p-8  { padding: 1.05rem !important; }
  .px-12, .px-10 { padding-left: 1.15rem !important; padding-right: 1.15rem !important; }
  .px-8 { padding-left: 1rem !important; padding-right: 1rem !important; }
  .py-16 { padding-top: 2.5rem !important; padding-bottom: 2.5rem !important; }
  .gap-8 { gap: 1rem !important; }
  .gap-10, .gap-12 { gap: 1.25rem !important; }

  /* --- Layout: seção de slide sempre alcançável pelo topo ---
     min-h-screen + justify-center clipa o topo quando o conteúdo é
     maior que a tela. No celular, ancora no topo e deixa rolar. */
  .min-h-screen {
    min-height: 100dvh !important;
    height: auto !important;
    padding-top: 2rem !important;
    padding-bottom: 2rem !important;
  }
  .min-h-screen.justify-center,
  .min-h-screen.items-center { justify-content: flex-start !important; }

  /* --- Grids/flex de 2+ colunas empilham (redundante ao md: do
         Tailwind, mas cobre grids sem breakpoint declarado). --- */
  .grid-cols-2, .grid-cols-3, .grid-cols-4 { grid-template-columns: 1fr !important; }

  /* --- Palco de animação (D3/SVG/canvas): nunca estoura a largura,
         mantém proporção e encolhe a altura. --- */
  .anim-stage {
    max-width: 100% !important;
    height: auto !important;
    aspect-ratio: 16 / 9;
    min-height: 0 !important;
  }

  /* --- Tabelas: fonte menor + rolagem horizontal se precisar. --- */
  table { font-size: 0.82rem !important; }
  .overflow-x-auto { -webkit-overflow-scrolling: touch; }

  /* --- Controles flutuantes respeitam a safe-area do iPhone. --- */
  #mira-next, #next-card {
    bottom: max(1rem, env(safe-area-inset-bottom)) !important;
    right: max(1rem, env(safe-area-inset-right)) !important;
    width: 44px !important; height: 44px !important;
  }
}
/* @MIRA:RESPONSIVE:END */
</style>
</head>
<body>
    <section>
        <h1>Teste de <span>redimensionar</span> e crop</h1>
        <svg id="pulso" viewBox="0 0 400 400" data-me-editable>
            <circle class="onda" cx="200" cy="200" r="170" fill="none" stroke="#FF904D" stroke-width="3"/>
            <circle class="onda o2" cx="200" cy="200" r="170" fill="none" stroke="#FF904D" stroke-width="3"/>
            <g class="anel">
                <circle cx="200" cy="200" r="130" fill="none" stroke="rgba(255,144,77,.35)" stroke-width="2" stroke-dasharray="6 10"/>
                <circle cx="200" cy="70" r="14" fill="#FF904D"/>
                <circle cx="330" cy="200" r="9" fill="#FFC766"/>
            </g>
            <g class="anel reverso">
                <circle cx="200" cy="200" r="85" fill="none" stroke="rgba(255,199,102,.35)" stroke-width="2" stroke-dasharray="4 8"/>
                <circle cx="200" cy="285" r="11" fill="#FFC766"/>
            </g>
            <circle class="nucleo" cx="200" cy="200" r="42" fill="#FF904D"/>
        </svg>
        <p class="dica">E = editar · arraste uma alça pra redimensionar · Alt + alça = crop (moldura verde) · P = pintar</p>
    </section>
    <section>
        <h2 style="font-size:clamp(1.3rem,3vw,2.2rem);margin:0">Segundo alvo de teste</h2>
        <svg id="barras" viewBox="0 0 400 220" style="width:min(40vh,36vw)" data-me-editable>
            <rect class="b1" x="40"  y="20" width="60" height="180" rx="8" fill="#FF904D"/>
            <rect class="b2" x="130" y="20" width="60" height="180" rx="8" fill="#FFC766"/>
            <rect class="b3" x="220" y="20" width="60" height="180" rx="8" fill="#FF904D"/>
            <rect class="b4" x="310" y="20" width="60" height="180" rx="8" fill="#FFC766"/>
        </svg>
        <p class="dica">Barras animadas: selecione e recorte com Alt — a animação interna não pode mudar.</p>
    </section>
    <!-- Modo edição (reordenar slides): tecla E ou ?edit=1 -->
    <script src="mira/mira-edit.js" defer></script>
    <!-- Telestrator (desenhar sobre o slide): tecla P ou ?draw=1 -->
    <script src="mira/mira-draw.js" defer></script>
    <!-- Edição livre (mover/redimensionar/rotacionar/duplicar/excluir/texto): tecla E -->
    <script src="mira/mira-edit-free.js" defer></script>
