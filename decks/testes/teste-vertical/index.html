<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Teste Vertical — Slide de Fluxo (16:9)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* @MIRA:THEME:START */
/* MIRA THEME: mira-dark (padrão)
   Identidade clássica do canal: fundo preto, laranja vibrante,
   glassmorphism no estilo clássico do canal. */
:root {
    --mira-primary: #FF904D;
    --mira-bg: #000000;
    --mira-text: #ffffff;
    --mira-text-soft: rgba(255, 255, 255, 0.70);
    --mira-text-softer: rgba(255, 255, 255, 0.50);
    --mira-card-bg: rgba(255, 255, 255, 0.05);
    --mira-card-border: rgba(255, 255, 255, 0.10);
    --mira-glow-soft: rgba(255, 144, 77, 0.15);
    --mira-glow-strong: rgba(255, 144, 77, 0.25);
    --mira-icon-bg: rgba(255, 144, 77, 0.15);
    --mira-icon-border: rgba(255, 144, 77, 0.30);
    --mira-pill-bg: rgba(255, 255, 255, 0.04);
    --mira-pill-border: rgba(255, 255, 255, 0.08);
    --mira-stage-glow: rgba(255, 144, 77, 0.06);
    --mira-accent-2: #FFC766;
}


/* ============================================================
   MIRA — base.css
   Estrutura compartilhada por todos os temas.
   Os temas definem apenas as CSS variables (--mira-*).
   ============================================================ */

body {
    background: var(--mira-bg);
    min-height: 100vh;
    color: var(--mira-text);
    font-family: 'Inter', sans-serif;
}

.primary-color { color: var(--mira-primary); }
.primary-bg { background: var(--mira-primary); }

.glass-card {
    background: var(--mira-card-bg);
    backdrop-filter: blur(10px);
    border: 1px solid var(--mira-card-border);
    box-shadow: 0 10px 30px var(--mira-glow-soft);
    transition: all 0.3s ease;
    border-radius: 0.75rem;
}

.icon-hero {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    display: flex;
    flex: 0 0 auto;
    align-items: center;
    justify-content: center;
    background: var(--mira-icon-bg);
    border: 1px solid var(--mira-icon-border);
}

.attribute-pill {
    background: var(--mira-pill-bg);
    border: 1px solid var(--mira-pill-border);
    transition: all 0.25s ease;
    border-radius: 9999px;
}

.attribute-pill:hover {
    background: var(--mira-icon-bg);
    border-color: var(--mira-icon-border);
    transform: translateY(-3px);
}

/* Palco de animação D3 */
.anim-stage {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: radial-gradient(circle at 50% 50%, var(--mira-stage-glow), transparent 70%);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
}

.anim-stage svg {
    display: block;
    width: 100%;
    height: 100%;
}

.replay-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--mira-pill-bg);
    border: 1px solid var(--mira-pill-border);
    color: var(--mira-text-soft);
    border-radius: 9999px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.25s ease;
}

.replay-btn:hover {
    background: var(--mira-icon-bg);
    color: var(--mira-primary);
}

.text-soft { color: var(--mira-text-soft); }
.text-softer { color: var(--mira-text-softer); }
        /* @MIRA:THEME:END */

        /* === CONTROLES DE SLIDE (passagem card-a-card) === */
        html { scroll-behavior: smooth; }

        #mira-progress {
            position: fixed; top: 0; left: 0; height: 3px; width: 0%;
            background: linear-gradient(90deg, var(--mira-primary), var(--mira-accent-2), var(--mira-primary));
            background-size: 200% 100%;
            animation: mira-shimmer 2s linear infinite;
            z-index: 9999; transition: width 0.1s linear;
            box-shadow: 0 0 10px var(--mira-glow-strong);
        }

        @keyframes mira-shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        #mira-next {
            position: fixed; bottom: 32px; right: 32px;
            width: 48px; height: 48px; border-radius: 50%;
            background: var(--mira-primary); color: var(--mira-bg);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: none;
            opacity: 0; transform: translateY(20px);
            transition: all 0.3s ease; z-index: 9998;
            box-shadow: 0 4px 20px var(--mira-glow-strong);
        }
        #mira-next.visible { opacity: 1; transform: translateY(0); }
        #mira-next:hover { transform: translateY(-3px) scale(1.1); }
    
/* @MIRA:RESPONSIVE:START */
/* ============================================================
   MIRA — responsive.css  (camada de reflow mobile-first)
   Objetivo: TODO slide 16:9 do Mira vira legível no celular em
   retrato SEM arquivo mobile separado. O mesmo deck se reorganiza:
   fontes encolhem, grids empilham, padding reduz, palcos escalam.

   Estratégia: os decks nascem "desktop-first" (classes Tailwind com
   tamanhos fixos: text-6xl, p-10, ...). Esta camada sobrescreve essas
   classes abaixo de 640px. Usa !important de propósito — precisa
   vencer o Tailwind CDN (injetado em runtime) em decks legados sem
   reescrever o HTML. Os clamps têm teto ~= valor desktop, então em
   telas largas nada muda; só encolhem no estreito.
   ============================================================ */

/* Guarda universal contra overflow horizontal (o "print cortado" no zap). */
html, body { max-width: 100%; overflow-x: hidden; }
img, svg, video, canvas, iframe, table, pre { max-width: 100%; }

@media (max-width: 640px) {

  /* --- Tipografia fluida: encolhe títulos gigantes no celular --- */
  .text-9xl { font-size: clamp(3rem, 12vw, 5rem)      !important; line-height: 1.05 !important; }
  .text-8xl { font-size: clamp(2.75rem, 11vw, 4.5rem) !important; line-height: 1.06 !important; }
  .text-7xl { font-size: clamp(2.25rem, 10vw, 3.75rem)!important; line-height: 1.08 !important; }
  .text-6xl { font-size: clamp(2rem, 9vw, 3rem)       !important; line-height: 1.1  !important; }
  .text-5xl { font-size: clamp(1.75rem, 8vw, 2.5rem)  !important; line-height: 1.12 !important; }
  .text-4xl { font-size: clamp(1.5rem, 7vw, 2rem)     !important; line-height: 1.15 !important; }
  .text-3xl { font-size: clamp(1.35rem, 6vw, 1.75rem) !important; line-height: 1.2  !important; }
  .text-2xl { font-size: clamp(1.2rem, 5vw, 1.5rem)   !important; line-height: 1.25 !important; }
  .text-xl  { font-size: clamp(1.05rem, 4.5vw, 1.25rem)!important; line-height: 1.3 !important; }

  /* Títulos: quebram entre palavras; só partem uma palavra se ela sozinha
     estourar a largura. Sem hyphens:auto — em PT ele hifena no meio
     ("pode-rosas") e fica feio em título de display. */
  h1, h2, h3 { overflow-wrap: break-word; }

  /* --- Espaçamento: paddings de desktop sufocam o celular --- */
  .p-12 { padding: 1.25rem !important; }
  .p-10 { padding: 1.15rem !important; }
  .p-8  { padding: 1.05rem !important; }
  .px-12, .px-10 { padding-left: 1.15rem !important; padding-right: 1.15rem !important; }
  .px-8 { padding-left: 1rem !important; padding-right: 1rem !important; }
  .py-16 { padding-top: 2.5rem !important; padding-bottom: 2.5rem !important; }
  .gap-8 { gap: 1rem !important; }
  .gap-10, .gap-12 { gap: 1.25rem !important; }

  /* --- Layout: seção de slide sempre alcançável pelo topo ---
     min-h-screen + justify-center clipa o topo quando o conteúdo é
     maior que a tela. No celular, ancora no topo e deixa rolar. */
  .min-h-screen {
    min-height: 100dvh !important;
    height: auto !important;
    padding-top: 2rem !important;
    padding-bottom: 2rem !important;
  }
  .min-h-screen.justify-center,
  .min-h-screen.items-center { justify-content: flex-start !important; }

  /* --- Grids/flex de 2+ colunas empilham (redundante ao md: do
         Tailwind, mas cobre grids sem breakpoint declarado). --- */
  .grid-cols-2, .grid-cols-3, .grid-cols-4 { grid-template-columns: 1fr !important; }

  /* --- Palco de animação (D3/SVG/canvas): nunca estoura a largura,
         mantém proporção e encolhe a altura. --- */
  .anim-stage {
    max-width: 100% !important;
    height: auto !important;
    aspect-ratio: 16 / 9;
    min-height: 0 !important;
  }

  /* --- Tabelas: fonte menor + rolagem horizontal se precisar. --- */
  table { font-size: 0.82rem !important; }
  .overflow-x-auto { -webkit-overflow-scrolling: touch; }

  /* --- Controles flutuantes respeitam a safe-area do iPhone. --- */
  #mira-next, #next-card {
    bottom: max(1rem, env(safe-area-inset-bottom)) !important;
    right: max(1rem, env(safe-area-inset-right)) !important;
    width: 44px !important; height: 44px !important;
  }
}
/* @MIRA:RESPONSIVE:END */
</style>
</head>

<body>
    <!-- Controles de slide: barra de progresso + botão flutuante "próximo" -->
    <div id="mira-progress"></div>
    <button id="mira-next" aria-label="Próximo slide">
        <i data-lucide="chevron-down" class="w-6 h-6" id="mira-next-icon"></i>
    </button>

    <!-- ============ SLIDE: FLUXO (partícula viajando) ============ -->
    <section class="min-h-screen flex flex-col items-center justify-center px-6 pt-3 pb-6">
        <div class="w-full max-w-6xl" data-aos="fade-up" data-aos-delay="100">
            <!-- Título do slide: SEM ícone, no máximo 6 palavras -->
            <div class="text-center mb-2">
                <h2 class="text-4xl md:text-5xl font-bold mb-2">
                    Do dado à <span class="primary-color italic">decisão</span>
                </h2>
                <p class="text-white/60 italic text-lg md:text-xl">Uma partícula percorre o caminho, etapa a etapa.</p>
            </div>

            <!-- Container visual com replay -->
            <div class="glass-card rounded-2xl p-1 md:p-2">
                <!-- Header bar interno -->
                <div class="flex items-center justify-between mb-2 px-1">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background: var(--mira-icon-bg);">
                            <i data-lucide="workflow" class="w-5 h-5 primary-color"></i>
                        </div>
                        <div>
                            <p class="text-white font-bold text-sm">Pipeline em quatro etapas</p>
                            <p class="text-white/50 text-xs italic">Fluxo contínuo, da coleta à decisão.</p>
                        </div>
                    </div>
                    <button id="replay-fluxo" class="replay-btn" type="button">
                        <i data-lucide="rotate-cw" class="w-4 h-4"></i>
                        Replay
                    </button>
                </div>

                <!-- Palco da animação -->
                <!-- @MIRA:SIZE 3/10 -->
                <div class="anim-stage" id="fluxo-stage"></div>

                <!-- Atributos/pílulas no rodapé -->
                <div class="border-t border-white/10 pt-1 mt-1 mb-1">
                    <p class="text-xs uppercase tracking-[3px] text-white/40 text-center mb-1">As quatro etapas do fluxo</p>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                        <div class="attribute-pill text-center p-1 rounded-xl">
                            <i data-lucide="database" class="w-4 h-4 primary-color mx-auto mb-1"></i>
                            <p class="text-sm font-semibold tracking-wide">Coletar</p>
                        </div>
                        <div class="attribute-pill text-center p-1 rounded-xl">
                            <i data-lucide="cpu" class="w-4 h-4 primary-color mx-auto mb-1"></i>
                            <p class="text-sm font-semibold tracking-wide">Processar</p>
                        </div>
                        <div class="attribute-pill text-center p-1 rounded-xl">
                            <i data-lucide="bar-chart-3" class="w-4 h-4 primary-color mx-auto mb-1"></i>
                            <p class="text-sm font-semibold tracking-wide">Analisar</p>
                        </div>
                        <div class="attribute-pill text-center p-1 rounded-xl">
                            <i data-lucide="flag" class="w-4 h-4 primary-color mx-auto mb-1"></i>
                            <p class="text-sm font-semibold tracking-wide">Decidir</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        AOS.init({ duration: 800, once: true });
        lucide.createIcons();

        const PRIMARY = getComputedStyle(document.documentElement).getPropertyValue('--mira-primary').trim();

        // ===== FLUXO: partícula viajando entre os nós (loop interno) =====
        (function () {
            const ETAPAS = ['Coletar', 'Processar', 'Analisar', 'Decidir'];
            const W = 960, H = 540;
            const svg = d3.select('#fluxo-stage').append('svg')
                .attr('viewBox', `0 0 ${W} ${H}`)
                .attr('preserveAspectRatio', 'xMidYMid meet');

            // Eixo de espalhamento: HORIZONTAL (esquerda -> direita)
            const xs = d3.scalePoint().domain(d3.range(ETAPAS.length)).range([120, W - 120]);
            const cy = H / 2;

            function animateFluxo() {
                // Reset + generation counter (anti-vazamento de loops)
                clearInterval(window.__fluxoPulse);
                window.__fluxoGen = (window.__fluxoGen || 0) + 1;
                const myGen = window.__fluxoGen;
                svg.selectAll('*').remove();

                // Trilho
                svg.append('line')
                    .attr('x1', xs(0)).attr('x2', xs(ETAPAS.length - 1))
                    .attr('y1', cy).attr('y2', cy)
                    .attr('stroke', 'rgba(255,255,255,0.12)').attr('stroke-width', 2);

                // Nós
                const nodes = svg.selectAll('g.node').data(ETAPAS).join('g')
                    .attr('class', 'node')
                    .attr('transform', (d, i) => `translate(${xs(i)},${cy})`);
                nodes.append('circle').attr('r', 0).attr('fill', 'rgba(255,255,255,0.06)')
                    .attr('stroke', PRIMARY).attr('stroke-width', 2)
                    .transition().delay((d, i) => 300 + i * 250).duration(600).ease(d3.easeBackOut).attr('r', 34);
                nodes.append('text').text((d, i) => i + 1)
                    .attr('text-anchor', 'middle').attr('dy', 6)
                    .attr('fill', PRIMARY).attr('font-size', 20).attr('font-weight', 800)
                    .attr('opacity', 0).transition().delay((d, i) => 600 + i * 250).attr('opacity', 1);
                // Rótulo do nó: ABAIXO (no 16:9 há largura de sobra)
                nodes.append('text').text(d => d)
                    .attr('text-anchor', 'middle').attr('dy', 70)
                    .attr('fill', 'rgba(255,255,255,0.7)').attr('font-size', 16)
                    .attr('opacity', 0).transition().delay((d, i) => 700 + i * 250).attr('opacity', 1);

                // Partícula viajando no eixo X (loop)
                const particle = svg.append('circle').attr('r', 7).attr('fill', PRIMARY)
                    .attr('cy', cy).attr('cx', xs(0))
                    .style('filter', `drop-shadow(0 0 8px ${PRIMARY})`);
                function travel() {
                    if (myGen !== window.__fluxoGen) return;
                    particle.attr('cx', xs(0)).attr('opacity', 1)
                        .transition().duration(3200).ease(d3.easeCubicInOut).attr('cx', xs(ETAPAS.length - 1))
                        .transition().duration(300).attr('opacity', 0)
                        .on('end', () => { if (myGen === window.__fluxoGen) travel(); });
                }
                travel();

                // Pulso dos nós em cascata (loop)
                window.__fluxoPulse = setInterval(() => {
                    if (myGen !== window.__fluxoGen) return;
                    nodes.selectAll('circle')
                        .transition().delay((d, i) => i * 200).duration(350).attr('r', 39)
                        .transition().duration(350).attr('r', 34);
                }, 3500);
            }

            // Trigger: dispara ao entrar no viewport, rearma ao sair; Replay refaz
            const stage = document.getElementById('fluxo-stage');
            const io = new IntersectionObserver((entries) => {
                entries.forEach(e => { if (e.isIntersecting) animateFluxo(); });
            }, { threshold: 0.4 });
            io.observe(stage);
            document.getElementById('replay-fluxo').addEventListener('click', animateFluxo);
        })();

        // === CONTROLES DE SLIDE: navegação card-a-card (progresso + botão + teclado) ===
        (function () {
            const cardSections = Array.from(document.querySelectorAll('body > section'));
            if (cardSections.length === 0) return;

            const progress = document.getElementById('mira-progress');
            const nextBtn = document.getElementById('mira-next');
            const nextIcon = document.getElementById('mira-next-icon');

            const atBottom = () =>
                (window.scrollY + window.innerHeight) >= (document.documentElement.scrollHeight - 100);

            function currentIndex() {
                const y = window.scrollY + window.innerHeight * 0.3;
                let idx = -1;
                for (let i = 0; i < cardSections.length; i++) {
                    if (cardSections[i].offsetTop <= y) idx = i;
                }
                return idx;
            }

            function goTo(i) {
                const idx = Math.max(0, Math.min(cardSections.length - 1, i));
                cardSections[idx].scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            window.addEventListener('scroll', () => {
                const docH = document.documentElement.scrollHeight - window.innerHeight;
                progress.style.width = (docH > 0 ? (window.scrollY / docH) * 100 : 0) + '%';
                nextBtn.classList.toggle('visible', window.scrollY > 300);
                nextIcon.setAttribute('data-lucide', atBottom() ? 'chevron-up' : 'chevron-down');
                lucide.createIcons();
            });

            nextBtn.addEventListener('click', () => {
                if (atBottom()) { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
                goTo(currentIndex() + 1);
            });

            document.addEventListener('keydown', (e) => {
                if (['ArrowRight', 'ArrowDown', 'PageDown'].includes(e.key)) {
                    e.preventDefault();
                    goTo(currentIndex() + 1);
                } else if (['ArrowLeft', 'ArrowUp', 'PageUp'].includes(e.key)) {
                    e.preventDefault();
                    const idx = currentIndex();
                    if (idx <= 0) window.scrollTo({ top: 0, behavior: 'smooth' });
                    else goTo(idx - 1);
                } else if (e.key === 'Home') {
                    e.preventDefault();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else if (e.key === 'End') {
                    e.preventDefault();
                    goTo(cardSections.length - 1);
                } else if (e.key.toLowerCase() === 'f') {
                    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                    else document.exitFullscreen();
                }
            });
        })();
    </script>
</body>

</html>
