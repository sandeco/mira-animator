<!DOCTYPE html>
<html lang="pt-BR" class="mira-debug-margem">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Teste Área Segura — Rede Densa (16:9)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
/* @MIRA:THEME:START */
:root {
    --mira-primary: #FF904D; --mira-bg: #000000; --mira-text: #ffffff;
    --mira-text-soft: rgba(255,255,255,0.70); --mira-card-bg: rgba(255,255,255,0.05);
    --mira-card-border: rgba(255,255,255,0.10); --mira-glow-soft: rgba(255,144,77,0.15);
    --mira-glow-strong: rgba(255,144,77,0.25); --mira-icon-bg: rgba(255,144,77,0.15);
    --mira-icon-border: rgba(255,144,77,0.30); --mira-pill-bg: rgba(255,255,255,0.04);
    --mira-pill-border: rgba(255,255,255,0.08); --mira-stage-glow: rgba(255,144,77,0.06);
    --mira-accent-2: #FFC766;
}
body { background: var(--mira-bg); min-height: 100vh; color: var(--mira-text); font-family: 'Inter', sans-serif; }
.primary-color { color: var(--mira-primary); }
.glass-card { background: var(--mira-card-bg); backdrop-filter: blur(10px); border: 1px solid var(--mira-card-border); box-shadow: 0 10px 30px var(--mira-glow-soft); border-radius: 0.75rem; }
.attribute-pill { background: var(--mira-pill-bg); border: 1px solid var(--mira-pill-border); border-radius: 9999px; }
.anim-stage { width: 100%; aspect-ratio: 16 / 9; background: radial-gradient(circle at 50% 50%, var(--mira-stage-glow), transparent 70%); border-radius: 8px; overflow: hidden; position: relative; }
.anim-stage svg { display: block; width: 100%; height: 100%; }
.replay-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--mira-pill-bg); border: 1px solid var(--mira-pill-border); color: var(--mira-text-soft); border-radius: 9999px; padding: 6px 14px; font-size: 12px; cursor: pointer; }
/* @MIRA:THEME:END */
/* DIRETIVA MIRA: título da capa com quebra equilibrada (só o primeiro slide). */
body > section:first-of-type h1, body > section:first-of-type h2 { text-wrap: balance; }
html { scroll-behavior: smooth; }
#mira-progress { position: fixed; top: 0; left: 0; height: 3px; width: 0%; background: linear-gradient(90deg, var(--mira-primary), var(--mira-accent-2), var(--mira-primary)); background-size: 200% 100%; z-index: 9999; }
/* DEBUG DA MARGEM: pinta os 50px de area segura medidos do BOX dos 2/3 (titulo e animacao ficam DENTRO). Liga com ?margem na URL ou tecla 'm'. */
html.mira-debug-margem body > section:has(.glass-card) > div { box-shadow: inset 0 0 0 50px rgba(255,45,45,0.45) !important; }
    </style>
<style id="mira-formato-thirds">
  :root { --thirds-align: flex-start; --thirds-width: 66.667%; }
  body > section { align-items:var(--thirds-align)!important; background:linear-gradient(to right, var(--mira-bg,#000) 0, var(--mira-bg,#000) 66.667%, #333333 66.667%, #333333 100%)!important; }
  body > section > div { width:var(--thirds-width)!important; max-width:var(--thirds-width)!important; }
  /* AREA SEGURA: o box dos 2/3 cobre a ALTURA CHEIA e leva 50px de margem; titulo e animacao vivem DENTRO. */
  body > section:has(.glass-card) { padding:0!important; }
  body > section:has(.glass-card) > div { flex:1 1 auto!important; min-height:0!important; display:flex!important; flex-direction:column!important; padding:50px!important; box-sizing:border-box!important; }
  body > section:has(.glass-card) .glass-card { flex:1 1 auto!important; min-height:0!important; display:flex!important; flex-direction:column!important; }
  .anim-stage { flex:1 1 auto!important; min-height:0!important; height:auto!important; width:100%!important; aspect-ratio:auto!important; max-width:none!important; margin-inline:0!important; padding:0!important; box-sizing:border-box!important; }
  body > section h2 { font-size:clamp(28px,4vh,44px)!important; line-height:1.1!important; }
  body > section:has(.glass-card) .text-center > p { display:none!important; }
  body > section:has(.glass-card) .text-center { margin:0 0 14px 0!important; padding:0!important; flex:0 0 auto!important; }
  body > section .glass-card { background:none!important; border:none!important; box-shadow:none!important; backdrop-filter:none!important; padding:0!important; }
  body > section .glass-card > div:first-child, body > section .glass-card > div:last-child { display:none!important; }
</style>
</head>

<body>
    <div id="mira-progress"></div>

    <!-- ============ SLIDE: REDE DENSA ============ -->
    <section class="min-h-screen flex flex-col items-center justify-center px-6 pt-3 pb-6">
        <div class="w-full max-w-6xl">
            <div class="text-center mb-2">
                <h2 class="text-4xl md:text-5xl font-bold mb-2">Rede densa de <span class="primary-color italic">dependências</span></h2>
                <p class="text-white/60 italic text-lg md:text-xl">Trinta nós em movimento contínuo, presos na área segura.</p>
            </div>
            <div class="glass-card rounded-2xl p-1 md:p-2">
                <div class="flex items-center justify-between mb-2 px-1">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background: var(--mira-icon-bg);">
                            <i data-lucide="share-2" class="w-5 h-5 primary-color"></i>
                        </div>
                        <div>
                            <p class="text-white font-bold text-sm">Grafo force-directed</p>
                            <p class="text-white/50 text-xs italic">Nenhum nó pode encostar na borda.</p>
                        </div>
                    </div>
                    <button id="replay-grafo" class="replay-btn" type="button"><i data-lucide="rotate-cw" class="w-4 h-4"></i> Replay</button>
                </div>
                <div class="anim-stage" id="grafo-stage"></div>
                <div class="border-t border-white/10 pt-1 mt-1 mb-1">
                    <p class="text-xs uppercase tracking-[3px] text-white/40 text-center mb-1">Teste de área segura</p>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                        <div class="attribute-pill text-center p-1 rounded-xl"><p class="text-sm font-semibold">Denso</p></div>
                        <div class="attribute-pill text-center p-1 rounded-xl"><p class="text-sm font-semibold">Animado</p></div>
                        <div class="attribute-pill text-center p-1 rounded-xl"><p class="text-sm font-semibold">Clampado</p></div>
                        <div class="attribute-pill text-center p-1 rounded-xl"><p class="text-sm font-semibold">50px</p></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        lucide.createIcons();
        (function () {
          const MAX_LINES=2, MIN_FONT=18;
          function fit(){document.querySelectorAll('body > section h2').forEach(h2=>{h2.style.removeProperty('font-size');let f=parseFloat(getComputedStyle(h2).fontSize),g=0;while(h2.scrollHeight>parseFloat(getComputedStyle(h2).lineHeight)*MAX_LINES+2&&f>MIN_FONT&&g<90){f-=1;h2.style.setProperty('font-size',f+'px','important');g++;}});}
          window.addEventListener('load',fit);if(document.fonts&&document.fonts.ready)document.fonts.ready.then(fit);window.addEventListener('resize',()=>{clearTimeout(window.__t);window.__t=setTimeout(fit,150);});
        })();

        const PRIMARY = getComputedStyle(document.documentElement).getPropertyValue('--mira-primary').trim();

        /* @MIRA:FMT:START */
        const FMT = { grafo: { W: 960, H: 810 } };
        /* @MIRA:FMT:END */

        // ===== REDE DENSA (force-directed) — PREENCHE a area segura via fit =====
        (function () {
            // Debug da margem: ?margem na URL ou tecla 'm' pinta os 50px.
            if (/[?&]margem/i.test(location.search)) document.documentElement.classList.add('mira-debug-margem');
            document.addEventListener('keydown', e => { if (e.key && e.key.toLowerCase() === 'm') document.documentElement.classList.toggle('mira-debug-margem'); });

            const F = FMT.grafo;
            const EDGE = 14; // folga interna minima (stroke/glow). A margem de 50px vem do padding do BLOCO dos 2/3 (area segura).
            const N = 30;
            const svg = d3.select('#grafo-stage').append('svg')
                .attr('viewBox', `0 0 ${F.W} ${F.H}`).attr('preserveAspectRatio', 'xMidYMid meet');

            // CASAR O PALCO: o viewBox segue a razao REAL do palco (a altura do titulo varia).
            function casarPalco() {
                const r = svg.node().closest('.anim-stage').getBoundingClientRect();
                if (r.width > 0 && r.height > 0) F.H = Math.round(F.W * r.height / r.width);
                svg.attr('viewBox', `0 0 ${F.W} ${F.H}`);
            }
            window.addEventListener('resize', () => { clearTimeout(window.__cpT); window.__cpT = setTimeout(casarPalco, 150); });
            if (document.fonts && document.fonts.ready) document.fonts.ready.then(() => setTimeout(casarPalco, 0));

            function build() {
                const nodes = d3.range(N).map(i => ({ id: i, r: 9 + (i % 6) * 4 }));
                const links = [];
                for (let i = 1; i < N; i++) links.push({ source: i, target: Math.floor(Math.random() * i) });
                for (let k = 0; k < 22; k++) {
                    const a = Math.floor(Math.random() * N), b = Math.floor(Math.random() * N);
                    if (a !== b) links.push({ source: a, target: b });
                }
                return { nodes, links };
            }

            // FIT-TO-AREA-SEGURA: escala e translada TODO o conteudo para preencher
            // [EDGE, W-EDGE] x [EDGE, H-EDGE], encostando na margem sem cruzar.
            function fitToArea(g) {
                g.attr('transform', null);
                const b = g.node().getBBox();
                if (!b.width || !b.height) return;
                const tw = F.W - 2 * EDGE, th = F.H - 2 * EDGE;
                const s = Math.min(tw / b.width, th / b.height);
                const tx = EDGE + (tw - b.width * s) / 2 - b.x * s;
                const ty = EDGE + (th - b.height * s) / 2 - b.y * s;
                g.attr('transform', `translate(${tx},${ty}) scale(${s})`);
            }

            function animateGrafo() {
                casarPalco(); // 1a linha: viewBox casado a razao real do palco
                if (window.__grafoSim) window.__grafoSim.stop();
                window.__grafoGen = (window.__grafoGen || 0) + 1;
                svg.selectAll('*').remove();

                const { nodes, links } = build();
                const root = svg.append('g'); // fit aplica a transform AQUI
                const link = root.append('g').attr('stroke', 'rgba(255,255,255,0.14)').attr('stroke-width', 1.2)
                    .selectAll('line').data(links).join('line');
                const node = root.append('g').selectAll('g').data(nodes).join('g');
                node.append('circle').attr('r', d => d.r)
                    .attr('fill', 'rgba(255,144,77,0.10)').attr('stroke', PRIMARY).attr('stroke-width', 1.6)
                    .style('filter', d => d.r > 20 ? `drop-shadow(0 0 6px ${PRIMARY})` : null);
                node.filter(d => d.r > 16).append('text').text(d => d.id)
                    .attr('text-anchor', 'middle').attr('dy', 5).attr('fill', PRIMARY).attr('font-size', 13).attr('font-weight', 700);

                const spread = Math.min(F.W, F.H);
                const sim = d3.forceSimulation(nodes)
                    .force('charge', d3.forceManyBody().strength(-spread * 1.1))
                    .force('link', d3.forceLink(links).distance(spread * 0.2).strength(0.1))
                    .force('center', d3.forceCenter(F.W / 2, F.H / 2))
                    .force('collide', d3.forceCollide(d => d.r + 10))
                    .velocityDecay(0.82).alphaDecay(0.015)
                    .on('tick', () => {
                        link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
                        node.attr('transform', d => `translate(${d.x},${d.y})`);
                        fitToArea(root); // preenche a area segura a cada quadro
                    });
                sim.alphaTarget(0.015).restart(); // movimento continuo suave (loop), sempre preenchido
                window.__grafoSim = sim;
            }

            const stage = document.getElementById('grafo-stage');
            new IntersectionObserver((es) => es.forEach(e => { if (e.isIntersecting) animateGrafo(); }), { threshold: 0.3 }).observe(stage);
            document.getElementById('replay-grafo').addEventListener('click', animateGrafo);
        })();
    </script>
</body>

</html>
