<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mira no Matrix, post animado em zoom (1:1)</title>
<style>
  /* Versão quadrada 1:1 generalista para a tela atual: lado = altura da tela (100vh).
     Numa tela 1080p, 1080x1080. Laterais fora do quadrado em #333333.
     Área segura de 50px (transparente): vem do padding-left do texto e da ancoragem
     do cursor (RIGHT_MARGIN), ambos = 50px. A chuva/CRT preenchem o quadro todo. */
  html { margin: 0; height: 100%; background: #333333; overflow: hidden; }
  body {
    margin: 0; height: 100%; background: #333333; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .mira-frame {
    position: relative; width: 100vh; height: 100vh;
    overflow: hidden; background: #010401;
  }

  /* chuva digital ao fundo */
  #matrix-rain {
    position: absolute; inset: 0;
    opacity: 0.26;
    transition: opacity 900ms ease;
  }
  body.revealed #matrix-rain { opacity: 0.45; }

  /* vinheta CRT + scanlines */
  .crt {
    position: absolute; inset: 0; pointer-events: none; z-index: 3;
    background:
      repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.18) 0 1px, transparent 1px 3px),
      radial-gradient(ellipse at center, transparent 55%, rgba(0, 10, 2, 0.55) 100%);
    animation: crt-flicker 4s steps(60) infinite;
  }
  @keyframes crt-flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.93; } }

  .zoom-stage { position: absolute; inset: 0; overflow: hidden; z-index: 2; }
  .zoom-block {
    position: absolute; top: 50%; left: 0; right: 0;
    will-change: transform;
    transition: transform 260ms ease;
  }
  .zoom-pan {
    will-change: transform;
    transition: transform 90ms linear;
  }
  .zoom-line {
    white-space: pre;
    font-family: 'Cascadia Mono', 'Consolas', 'Ubuntu Mono', 'DejaVu Sans Mono', 'Liberation Mono', monospace;
    font-size: clamp(40px, 6vh, 110px);        /* relativo ao quadrado (vh = lado do quadro) */
    line-height: 1.2;
    min-height: 1.2em;                         /* linha vazia (dois /n seguidos) mantém a altura */
    color: #d9ffe4;
    text-shadow: 0 0 6px rgba(0, 255, 65, 0.85), 0 0 22px rgba(0, 255, 65, 0.40), 0 0 60px rgba(0, 255, 65, 0.18);
    padding-left: 50px;                        /* margem esquerda da área segura (50px) */
    transition: opacity 260ms ease;
  }
  .zoom-line.past { opacity: 0.5; }            /* linhas concluídas: mais transparentes, foco na ativa */
  body.revealed .zoom-line { animation: reveal-pulse 1.6s ease 1; }
  @keyframes reveal-pulse {
    0% { text-shadow: 0 0 6px rgba(0,255,65,.85), 0 0 22px rgba(0,255,65,.4); }
    40% { text-shadow: 0 0 14px rgba(0,255,65,1), 0 0 48px rgba(0,255,65,.75), 0 0 110px rgba(0,255,65,.4); }
    100% { text-shadow: 0 0 6px rgba(0,255,65,.85), 0 0 22px rgba(0,255,65,.4); }
  }
  .zoom-cursor {
    display: inline-block;
    width: 0.09em; height: 1.05em;
    background: #7dffa5;
    box-shadow: 0 0 10px rgba(0, 255, 65, 0.9), 0 0 30px rgba(0, 255, 65, 0.5);
    vertical-align: -0.12em;
    margin-left: 0.04em;
  }
  .zoom-cursor.blink { animation: zoom-caret 1.06s steps(1, end) infinite; }
  @keyframes zoom-caret { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

  /* selo no rodapé (dentro da área segura do quadro) */
  #enter-hint {
    position: absolute; left: 50%; bottom: 7vh; transform: translateX(-50%);
    z-index: 4;
    font-family: 'Cascadia Mono', 'Consolas', 'Ubuntu Mono', 'DejaVu Sans Mono', 'Liberation Mono', monospace;
    font-size: clamp(14px, 1.6vh, 22px);
    letter-spacing: 0.45em;
    color: #00ff41;
    text-shadow: 0 0 8px rgba(0, 255, 65, 0.8);
    animation: hint-pulse 1.8s ease-in-out infinite;
    transition: opacity 400ms ease;
  }
  #enter-hint.off { opacity: 0; }
  @keyframes hint-pulse { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }
</style>
</head>
<body>
<div class="mira-frame">
  <canvas id="matrix-rain"></canvas>
  <div class="zoom-stage">
    <div class="zoom-block" id="zoom-block"><div class="zoom-pan" id="zoom-pan"><span class="zoom-cursor blink" id="zoom-cursor"></span></div></div>
  </div>
  <div class="crt"></div>
  <div id="enter-hint">[ mira.sandeco.com.br ]</div>
</div>
<script>
(function () {
  // LINES: cada linha é uma lista de segmentos { text, color }.
  // "/n" no argumento vira uma nova linha; tags color=#HEX viram a cor do segmento;
  // "/p300" vira um token { pause: 300 } entre segmentos (micro pausa de 300ms).
  const LINES = [
    [ { text: 'MIRA-Animator by sandeco', color: '#d9ffe4' }, { pause: 2000 } ],
    [ { text: 'Com o MIRA você digita um comando', color: '#d9ffe4' } ],
    [ { text: 'e a tela vira cena de cinema.', color: '#d9ffe4' } ],
    [],
    [ { text: 'É o /mira-animated-typing, um novo agente do Mira.', color: '#d9ffe4' } ],
    [],
    [ { text: 'Esse agente simula você digitando um prompt pra uma IA em fonte de terminal gigante, a câmera seguindo o cursor.', color: '#d9ffe4' } ],
    [],
    [ { text: 'Pausa, quebra de linha e cor, você controla tudo dentro do próprio texto.', color: '#d9ffe4' } ],
    [],
    [ { text: 'Pedi ao MIRA dentro do Claude Code', color: '#d9ffe4' } ],
    [ { text: 'um visual estilo Matrix', color: '#d9ffe4' } ],
    [ { text: 'e é o que você está vendo aqui.', color: '#d9ffe4' } ],
    [ { text: 'E você pode criar slides e', color: '#d9ffe4' } ],
    [ { text: 'apresentações incríveis também', color: '#d9ffe4' } ],
    [],
    [ { text: 'MIRA-Animator by sandeco', color: '#d9ffe4' } ],
  ];
  const RIGHT_MARGIN = 50;                      // px de ancoragem do cursor à direita (margem da área segura)
  const TYPE_MIN = 100, TYPE_MAX = 230;        // ms por caractere
  const START_DELAY = 2120;                    // 2 piscadas completas de 1.06s antes de digitar
  const NEWLINE_PAUSE = 350;                   // pausa do "Enter"
  const WAIT_FOR_ENTER = false;                // false aqui: inicia sozinho, digita uma vez e para no fim (sem loop)
  const SCRAMBLE = '01<>*+$#%&@!?=';           // glyphs ASCII (largura mono estável) do efeito decode

  const block = document.getElementById('zoom-block');
  const pan = document.getElementById('zoom-pan');
  const cursor = document.getElementById('zoom-cursor');
  const hint = document.getElementById('enter-hint');
  const frame = document.querySelector('.mira-frame');  // o quadrado 1:1: toda a geometria mede ele, não a janela
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  let lineEls = [];
  let revealed = false;

  function activeLine() { return lineEls[lineEls.length - 1]; }

  function newLine() {
    lineEls.forEach(el => el.classList.add('past'));  // linhas concluídas perdem um pouco de opacidade
    const div = document.createElement('div');
    div.className = 'zoom-line';
    pan.appendChild(div);
    div.appendChild(cursor);                   // o cursor desce para a linha nova
    lineEls.push(div);
    followY();
    pan.style.transition = 'transform 260ms ease';  // a câmera volta ao início suave no "Enter"
    followX();
    setTimeout(() => { pan.style.transition = ''; }, 300);
    return div;
  }

  function segSpan(lineEl, color) {
    const s = document.createElement('span');
    s.style.color = color;
    lineEl.insertBefore(s, cursor);
    return s;
  }

  // Ancoragem por geometria de layout: offsetLeft/offsetTop ignoram o transform corrente (sem drift).
  function followX() {
    const caretEnd = cursor.offsetLeft + cursor.offsetWidth;
    const shift = Math.max(0, caretEnd - (frame.clientWidth - RIGHT_MARGIN));
    pan.style.transform = 'translateX(' + (-shift) + 'px)';  // câmera: todas as linhas deslocam juntas
  }

  function followY() {
    const el = activeLine();                   // linha ativa sempre centralizada na vertical
    block.style.transform = 'translateY(' + (-(el.offsetTop + el.offsetHeight / 2)) + 'px)';
  }

  // Reveal (zoom out): mostra o texto inteiro centralizado no quadro, dentro da área segura (50px).
  function revealAll() {
    revealed = true;
    document.body.classList.add('revealed');   // chuva mais viva + pulso de glow
    lineEls.forEach(el => el.classList.remove('past'));  // tudo em opacidade cheia
    const textW = Math.max.apply(null, lineEls.map(el => el.scrollWidth)) - 50;  // 50 = padding-left
    const totalH = pan.offsetHeight;
    const availW = frame.clientWidth - 100, availH = frame.clientHeight - 100;   // 50px de área segura em cada lado
    const s = Math.min(availW / textW, availH / totalH, 1);
    const tx = (frame.clientWidth - textW * s) / 2 - 50 * s;
    pan.style.transition = 'transform 700ms ease';
    block.style.transition = 'transform 700ms ease';
    pan.style.transformOrigin = 'top left';
    pan.style.transform = 'translate(' + tx + 'px, 0) scale(' + s + ')';
    block.style.transform = 'translateY(' + (-(totalH * s) / 2) + 'px)';
  }

  function typeAll(done) {
    cursor.classList.remove('blink');
    let li = 0, si = 0, ci = 0, span = null, lineEl = activeLine();
    (function step() {
      if (li >= LINES.length) { done(); return; }
      const segs = LINES[li];
      if (si >= segs.length) {                 // fim da linha: "Enter"
        li++; si = 0; ci = 0; span = null;
        if (li < LINES.length) { setTimeout(() => { lineEl = newLine(); step(); }, NEWLINE_PAUSE); return; }
        done(); return;
      }
      if (!span) {
        if (segs[si].pause) {                  // micro pausa "/pN": cursor aceso, digitação retoma sozinha
          const wait = segs[si].pause;
          si++;
          setTimeout(step, wait);
          return;
        }
        span = segSpan(lineEl, segs[si].color);
      }
      ci++;
      const target = segs[si].text, sp = span, c = ci;
      // efeito decode: o caractere novo tremula um glyph aleatório antes de assentar
      sp.textContent = target.slice(0, c - 1) + SCRAMBLE[Math.floor(Math.random() * SCRAMBLE.length)];
      setTimeout(() => { sp.textContent = target.slice(0, c); followX(); }, 45);
      if (ci >= target.length) { si++; span = null; ci = 0; }
      followX();
      setTimeout(step, TYPE_MIN + Math.random() * (TYPE_MAX - TYPE_MIN));
    })();
  }

  function reset() {
    pan.appendChild(cursor);                   // tira o cursor da linha antiga antes de removê-la
    lineEls.forEach(el => el.remove());
    lineEls = [];
    block.style.transition = 'none';
    pan.style.transition = 'none';
    pan.style.transform = 'translateX(0)';
    newLine();
    void block.offsetWidth;                    // aplica o reset antes de reativar as transições
    block.style.transition = '';
    pan.style.transition = '';
  }

  function run() {
    reset();
    if (reduced) {                             // estático: tudo pronto, nem o blink anima
      LINES.forEach((segs, i) => {
        const el = i === 0 ? activeLine() : newLine();
        segs.forEach(sg => { if (sg.text) segSpan(el, sg.color).textContent = sg.text; });
      });
      followY(); followX();
      cursor.classList.remove('blink');
      hint.classList.add('off');
      return;
    }
    cursor.classList.remove('blink');
    void cursor.offsetWidth;                   // reinicia o ciclo de blink do zero (fase alinhada)
    cursor.classList.add('blink');
    if (WAIT_FOR_ENTER) {                      // pisca até o Enter; digita uma vez e para (sem loop)
      const start = (e) => {
        if (e.key !== 'Enter') return;
        window.removeEventListener('keydown', start);
        hint.classList.add('off');
        typeAll(() => {
          cursor.classList.add('blink');
          const reveal = (ev) => {             // segundo Enter no fim: zoom out revelando tudo
            if (ev.key !== 'Enter') return;
            window.removeEventListener('keydown', reveal);
            revealAll();
          };
          window.addEventListener('keydown', reveal);
        });
      };
      window.addEventListener('keydown', start);
      return;
    }
    setTimeout(() => typeAll(() => {
      cursor.classList.add('blink');           // fim: para piscando (sem loop)
      const reveal = (ev) => {                  // Enter no fim: zoom out revelando tudo
        if (ev.key !== 'Enter') return;
        window.removeEventListener('keydown', reveal);
        revealAll();
      };
      window.addEventListener('keydown', reveal);
    }), START_DELAY);
  }

  window.addEventListener('resize', () => {
    if (revealed) { revealAll(); return; }     // reveal recalculado para o novo tamanho do quadro
    followY(); followX();
  });

  // ===== chuva digital (Matrix rain) =====
  (function rain() {
    const canvas = document.getElementById('matrix-rain');
    if (reduced) { canvas.remove(); return; }  // reduced motion: sem chuva
    const ctx = canvas.getContext('2d');
    const GLYPHS = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホ0123456789';
    const FONT = 18;
    let cols = 0, drops = [];
    function size() {
      canvas.width = frame.clientWidth;        // canvas do tamanho do quadrado, não da janela
      canvas.height = frame.clientHeight;
      cols = Math.ceil(canvas.width / FONT);
      drops = Array.from({ length: cols }, () => Math.random() * canvas.height / FONT * -1);
      ctx.fillStyle = '#010401';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    size();
    window.addEventListener('resize', size);
    setInterval(() => {
      ctx.fillStyle = 'rgba(1, 4, 1, 0.10)';   // rastro que esmaece
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = FONT + 'px monospace';
      for (let i = 0; i < cols; i++) {
        const y = drops[i] * FONT;
        if (y > 0) {
          ctx.fillStyle = 'rgba(190, 255, 205, 0.95)';  // cabeça da gota, mais clara
          ctx.fillText(GLYPHS[Math.floor(Math.random() * GLYPHS.length)], i * FONT, y);
          ctx.fillStyle = 'rgba(0, 255, 65, 0.55)';     // corpo
          ctx.fillText(GLYPHS[Math.floor(Math.random() * GLYPHS.length)], i * FONT, y - FONT);
        }
        drops[i] += 0.55 + Math.random() * 0.35;
        if (y > canvas.height && Math.random() > 0.976) drops[i] = Math.random() * -20;
      }
    }, 50);
  })();

  run();
})();
</script>
</body>
</html>
