<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Teste 3D: Cérebro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <style>
        body {
            background: #000000;
            min-height: 100vh;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(255, 144, 77, 0.15);
        }

        .primary-color {
            color: #FF904D;
        }

        #brain-canvas-wrap {
            position: relative;
            width: 100%;
            height: 76vh;
            min-height: 480px;
            cursor: grab;
        }

        #brain-canvas-wrap:active {
            cursor: grabbing;
        }
    
/* @MIRA:RESPONSIVE:START */
/* ============================================================
   MIRA — responsive.css  (camada de reflow mobile-first)
   Objetivo: TODO slide 16:9 do Mira vira legível no celular em
   retrato SEM arquivo mobile separado. O mesmo deck se reorganiza:
   fontes encolhem, grids empilham, padding reduz, palcos escalam.

   Estratégia: os decks nascem "desktop-first" (classes Tailwind com
   tamanhos fixos: text-6xl, p-10, ...). Esta camada sobrescreve essas
   classes abaixo de 640px. Usa !important de propósito — precisa
   vencer o Tailwind CDN (injetado em runtime) em decks legados sem
   reescrever o HTML. Os clamps têm teto ~= valor desktop, então em
   telas largas nada muda; só encolhem no estreito.
   ============================================================ */

/* Guarda universal contra overflow horizontal (o "print cortado" no zap). */
html, body { max-width: 100%; overflow-x: hidden; }
img, svg, video, canvas, iframe, table, pre { max-width: 100%; }

@media (max-width: 640px) {

  /* --- Tipografia fluida: encolhe títulos gigantes no celular --- */
  .text-9xl { font-size: clamp(3rem, 12vw, 5rem)      !important; line-height: 1.05 !important; }
  .text-8xl { font-size: clamp(2.75rem, 11vw, 4.5rem) !important; line-height: 1.06 !important; }
  .text-7xl { font-size: clamp(2.25rem, 10vw, 3.75rem)!important; line-height: 1.08 !important; }
  .text-6xl { font-size: clamp(2rem, 9vw, 3rem)       !important; line-height: 1.1  !important; }
  .text-5xl { font-size: clamp(1.75rem, 8vw, 2.5rem)  !important; line-height: 1.12 !important; }
  .text-4xl { font-size: clamp(1.5rem, 7vw, 2rem)     !important; line-height: 1.15 !important; }
  .text-3xl { font-size: clamp(1.35rem, 6vw, 1.75rem) !important; line-height: 1.2  !important; }
  .text-2xl { font-size: clamp(1.2rem, 5vw, 1.5rem)   !important; line-height: 1.25 !important; }
  .text-xl  { font-size: clamp(1.05rem, 4.5vw, 1.25rem)!important; line-height: 1.3 !important; }

  /* Títulos: quebram entre palavras; só partem uma palavra se ela sozinha
     estourar a largura. Sem hyphens:auto — em PT ele hifena no meio
     ("pode-rosas") e fica feio em título de display. */
  h1, h2, h3 { overflow-wrap: break-word; }

  /* --- Espaçamento: paddings de desktop sufocam o celular --- */
  .p-12 { padding: 1.25rem !important; }
  .p-10 { padding: 1.15rem !important; }
  .p-8  { padding: 1.05rem !important; }
  .px-12, .px-10 { padding-left: 1.15rem !important; padding-right: 1.15rem !important; }
  .px-8 { padding-left: 1rem !important; padding-right: 1rem !important; }
  .py-16 { padding-top: 2.5rem !important; padding-bottom: 2.5rem !important; }
  .gap-8 { gap: 1rem !important; }
  .gap-10, .gap-12 { gap: 1.25rem !important; }

  /* --- Layout: seção de slide sempre alcançável pelo topo ---
     min-h-screen + justify-center clipa o topo quando o conteúdo é
     maior que a tela. No celular, ancora no topo e deixa rolar. */
  .min-h-screen {
    min-height: 100dvh !important;
    height: auto !important;
    padding-top: 2rem !important;
    padding-bottom: 2rem !important;
  }
  .min-h-screen.justify-center,
  .min-h-screen.items-center { justify-content: flex-start !important; }

  /* --- Grids/flex de 2+ colunas empilham (redundante ao md: do
         Tailwind, mas cobre grids sem breakpoint declarado). --- */
  .grid-cols-2, .grid-cols-3, .grid-cols-4 { grid-template-columns: 1fr !important; }

  /* --- Palco de animação (D3/SVG/canvas): nunca estoura a largura,
         mantém proporção e encolhe a altura. --- */
  .anim-stage {
    max-width: 100% !important;
    height: auto !important;
    aspect-ratio: 16 / 9;
    min-height: 0 !important;
  }

  /* --- Tabelas: fonte menor + rolagem horizontal se precisar. --- */
  table { font-size: 0.82rem !important; }
  .overflow-x-auto { -webkit-overflow-scrolling: touch; }

  /* --- Controles flutuantes respeitam a safe-area do iPhone. --- */
  #mira-next, #next-card {
    bottom: max(1rem, env(safe-area-inset-bottom)) !important;
    right: max(1rem, env(safe-area-inset-right)) !important;
    width: 44px !important; height: 44px !important;
  }
}
/* @MIRA:RESPONSIVE:END */
</style>
</head>

<body class="font-sans">

    <!-- Card 1: Cérebro em 3D -->
    <section class="min-h-screen flex flex-col items-center justify-center px-6 pt-3 pb-6">
        <div class="w-full max-w-6xl" data-aos="fade-up" data-aos-delay="100">
            <!-- Título do slide: SEM ícone, no máximo 6 palavras -->
            <div class="text-center mb-2">
                <h2 class="text-4xl md:text-5xl font-bold mb-2">
                    Cérebro <span class="primary-color italic">em 3D</span>
                </h2>
                <p class="text-white/60 italic text-lg md:text-xl">Slide de teste da skill mira-3d.</p>
            </div>

            <!-- Modelo: Allen Human Brain Atlas, via HuBMAP CCF 3D Reference
                 Object Library (CC BY 4.0). Detalhes em assets/README.md. -->
            <div class="glass-card rounded-2xl p-3 md:p-4">
                <div id="brain-canvas-wrap"></div>
            </div>
        </div>
    </section>

    <script>
        AOS.init({ duration: 800, once: true, offset: 100 });
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const wrap = document.getElementById('brain-canvas-wrap');

        // === Cena, câmera, renderer ===
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, wrap.clientWidth / wrap.clientHeight, 0.1, 100);
        camera.position.set(0, 0.4, 3.4);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(wrap.clientWidth, wrap.clientHeight);
        wrap.appendChild(renderer.domElement);

        // === Luzes ===
        scene.add(new THREE.AmbientLight(0xffffff, 0.55));
        const keyLight = new THREE.DirectionalLight(0xffffff, 1.6);
        keyLight.position.set(2.5, 3, 4);
        scene.add(keyLight);
        const rimLight = new THREE.DirectionalLight(0xff7733, 2.2);
        rimLight.position.set(-4, -1.5, -3);
        scene.add(rimLight);

        // === Carrega o modelo .glb (Allen Human Brain Atlas, CC BY 4.0) ===
        const brain = new THREE.Group();
        brain.rotation.x = 0.12;
        scene.add(brain);

        const loadingMsg = document.createElement('p');
        loadingMsg.textContent = 'Carregando modelo 3D...';
        loadingMsg.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.5);';
        wrap.appendChild(loadingMsg);

        new GLTFLoader().load(
            'assets/brain.glb',
            (gltf) => {
                const model = gltf.scene;
                // Centraliza e escala para caber no enquadramento da câmera
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                model.position.sub(center);
                brain.add(model);
                brain.scale.setScalar(2.7 / Math.max(size.x, size.y, size.z));
                loadingMsg.remove();
            },
            undefined,
            () => {
                loadingMsg.textContent = 'Falha ao carregar assets/brain.glb. Abra a página por um servidor HTTP local (não file://).';
            }
        );

        // === Interação: arrastar gira, scroll dá zoom ===
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.enablePan = false;
        controls.minDistance = 1.8;
        controls.maxDistance = 6;

        // Giro contínuo (Regra Zero): pausa quando o usuário arrasta, retoma após inatividade
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2.0;
        let resumeTimer = null;
        controls.addEventListener('start', () => {
            controls.autoRotate = false;
            clearTimeout(resumeTimer);
        });
        controls.addEventListener('end', () => {
            resumeTimer = setTimeout(() => { controls.autoRotate = true; }, 2500);
        });

        // === Loop de render, pausado quando o slide sai de tela ===
        let rafId = null;
        function animate() {
            rafId = requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        const visObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && rafId === null) {
                    animate();
                } else if (!entry.isIntersecting && rafId !== null) {
                    cancelAnimationFrame(rafId);
                    rafId = null;
                }
            });
        }, { threshold: 0.1 });
        visObserver.observe(wrap);

        // === Resize ===
        new ResizeObserver(() => {
            const w = wrap.clientWidth, h = wrap.clientHeight;
            if (w === 0 || h === 0) return;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        }).observe(wrap);
    </script>
</body>

</html>
