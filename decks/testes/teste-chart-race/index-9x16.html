<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mira — Chart Race (dados temporais animados)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* @MIRA:THEME:START */
        :root {
            --mira-primary: #FF904D;
            --mira-bg: #000000;
            --mira-text: #ffffff;
            --mira-text-soft: rgba(255, 255, 255, 0.70);
            --mira-text-softer: rgba(255, 255, 255, 0.50);
            --mira-card-bg: rgba(255, 255, 255, 0.05);
            --mira-card-border: rgba(255, 255, 255, 0.10);
            --mira-glow-soft: rgba(255, 144, 77, 0.15);
            --mira-glow-strong: rgba(255, 144, 77, 0.25);
            --mira-stage-glow: rgba(255, 144, 77, 0.06);
            --mira-accent-2: #FFC766;
        }

        body {
            background: var(--mira-bg);
            min-height: 100vh;
            color: var(--mira-text);
            font-family: 'Inter', sans-serif;
        }

        .primary-color { color: var(--mira-primary); }
        .text-soft { color: var(--mira-text-soft); }
        .text-softer { color: var(--mira-text-softer); }

        .glass-card {
            background: var(--mira-card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--mira-card-border);
            box-shadow: 0 10px 30px var(--mira-glow-soft);
            border-radius: 0.75rem;
        }

        /* Palco de animação D3 (16:9) */
        .anim-stage {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: radial-gradient(circle at 50% 50%, var(--mira-stage-glow), transparent 70%);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        .anim-stage svg { display: block; width: 100%; height: 100%; }

        /* Controles de slide */
        html { scroll-behavior: smooth; }
        #mira-progress {
            position: fixed; top: 0; left: 0; height: 3px; width: 0%;
            background: linear-gradient(90deg, var(--mira-primary), var(--mira-accent-2), var(--mira-primary));
            background-size: 200% 100%; animation: mira-shimmer 2s linear infinite;
            z-index: 9999; transition: width 0.1s linear; box-shadow: 0 0 10px var(--mira-glow-strong);
        }
        @keyframes mira-shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        #mira-next {
            position: fixed; bottom: 32px; right: 32px; width: 48px; height: 48px; border-radius: 50%;
            background: var(--mira-primary); color: var(--mira-bg);
            display: flex; align-items: center; justify-content: center; cursor: pointer; border: none;
            opacity: 0; transform: translateY(20px); transition: all 0.3s ease; z-index: 9998;
            box-shadow: 0 4px 20px var(--mira-glow-strong);
        }
        #mira-next.visible { opacity: 1; transform: translateY(0); }
        /* @MIRA:THEME:END */
    </style>
    <style id="mira-formato-9x16">
      /* Versao vertical (9:16) deste deck, adaptada do playbook mira-vertical.
         Aqui a coluna preenche o frame INTEIRO (o proprio quadro de captura ja e
         9:16), sem margens laterais. So titulo no topo + o grafico alto embaixo. */
      :root { --fmt-w: 100vw; --fmt-h: 100vh; }
      html, body { background: var(--mira-bg, #000); }
      body { display: flex; flex-direction: column; align-items: center; }
      body > section {
        width: var(--fmt-w) !important;
        height: var(--fmt-h) !important;
        min-height: var(--fmt-h) !important;
        overflow: hidden;
        background: var(--mira-bg, #000) !important;
      }
      body > section .max-w-6xl,
      body > section .max-w-5xl,
      body > section .max-w-4xl { max-width: 100% !important; }
      /* canvas alto padrao (128/203); o viewBox do chart foi esticado em altura para casar */
      .anim-stage { height: auto !important; aspect-ratio: 128 / 203 !important; }
      /* so titulo + animacao: some subtitulo; card sem fundo/borda/padding */
      body > section h2 { font-size: clamp(35px, 5.2vh, 60px) !important; line-height: 1.1 !important; }
      body > section:has(.glass-card) .text-center > p { display: none !important; }
      body > section:has(.glass-card) .text-center { margin-bottom: 10px !important; padding: 0 14px !important; }
      body > section:has(.glass-card) { justify-content: flex-start !important; padding: 3vh 10px 1.4vh 10px !important; }
      body > section .glass-card { background: none !important; border: none !important; box-shadow: none !important; backdrop-filter: none !important; padding: 0 !important; }
      /* header/base do card ocultos, MAS nunca o proprio .anim-stage
         (neste deck o card tem um filho so: o grafico) */
      body > section .glass-card > div:first-child:not(.anim-stage),
      body > section .glass-card > div:last-child:not(.anim-stage) { display: none !important; }
    </style>
</head>

<body>
    <div id="mira-progress"></div>
    <button id="mira-next" aria-label="Próximo slide">
        <i data-lucide="chevron-down" class="w-6 h-6" id="mira-next-icon"></i>
    </button>

    <!-- ============ SLIDE 1: CHART RACE — BARRAS ============ -->
    <section class="min-h-screen flex flex-col items-center justify-center px-6 py-16">
        <div class="text-center mb-8" data-aos="fade-up">
            <h2 class="text-5xl font-black">As linguagens mais usadas</h2>
            <p class="text-soft text-lg mt-3">Participação ao longo do tempo · dados ilustrativos</p>
        </div>
        <div class="glass-card w-full max-w-5xl p-6" data-aos="fade-up">
            <div id="race-bars" class="anim-stage"></div>
        </div>
    </section>

    <!-- ============ SLIDE 2: CHART RACE — LINHAS ============ -->
    <section class="min-h-screen flex flex-col items-center justify-center px-6 py-16">
        <div class="text-center mb-8" data-aos="fade-up">
            <h2 class="text-5xl font-black">Adoção paga por fornecedor de IA</h2>
            <p class="text-soft text-lg mt-3">% de empresas que pagam cada fornecedor · dados ilustrativos</p>
        </div>
        <div class="glass-card w-full max-w-5xl p-6" data-aos="fade-up">
            <div id="race-lines" class="anim-stage"></div>
        </div>
    </section>

    <!-- ============================================================
         MOTOR CHART-RACE (D3 v7) — dados temporais animados
         Dois modos no mesmo motor: 'bars' (corrida de barras) e
         'lines' (linhas desenhadas). Dados EMBUTIDOS inline (CSV
         largo: 1a coluna = periodo, demais = uma serie por coluna),
         parseados com d3.csvParse: funciona por file:// (sem fetch).
         Toca uma vez e PARA no quadro final (sem loop), por escolha do usuario.
         ============================================================ -->
    <script>
        // ---- DADOS (CSV largo, ilustrativos) ----
        const CSV_BARS = `
periodo,Java,PHP,JavaScript,C,C++,Python,C#,Visual Basic,TypeScript,Go,Rust
2004,34,23,21,15,11,4,7,8,0,0,0
2007,33,21,20,15,11,6,9,7,0,0,0
2010,31,19,19,16,10,9,10,6,0,0.3,0
2013,28,16,20,15,9,12,9,4,0.5,1,0.2
2016,25,12,21,12,8,17,8,2,2,2.5,0.8
2019,21,9,20,9,7,24,8,1,4,3.5,1.6
2022,18,6,19,7,7,29,7.5,0.6,6,4.5,3.3
2025,17,5.4,18.8,6,6.4,32,7.6,0.3,7.4,5.2,5.3
`;

        const CSV_LINES = `
periodo,OpenAI,Anthropic,Google,xAI,DeepSeek
2023 Q1,5,1,4,0,0
2023 Q2,9,1.5,4.2,0,0
2023 Q3,14,2,4.5,0,0
2023 Q4,19,3,4.8,0,0
2024 Q1,24,4,5,0.5,0
2024 Q2,28,5.5,5.2,1,0
2024 Q3,31,7,5.3,1.5,0
2024 Q4,34,9,5.4,2,0.05
2025 Q1,36,11,5.5,2.4,0.08
2025 Q2,38,13,5.6,2.8,0.1
2025 Q3,39.5,16,5.8,3,0.15
2025 Q4,40.5,22,5.9,3.05,0.2
2026 Q1,40,32,6,3.1,0.25
2026 Q2,39.5,41,6.1,3.12,0.3
`;

        const PALETTE = ['#FF904D', '#4DC4D9', '#7DD957', '#FFD24D', '#FF6B6B', '#5C9DFF', '#FF9EC4', '#B388FF', '#FFB74D', '#4DD0A0', '#E573C7', '#9CCC65'];
        const PRIMARY = getComputedStyle(document.documentElement).getPropertyValue('--mira-primary').trim() || '#FF904D';

        function miraChartRace(cfg) {
            const o = Object.assign({
                mode: 'bars', topN: 12, unit: '', decimals: 1, stepMs: 1400
            }, cfg);
            const root = d3.select(o.selector);
            if (typeof d3 === 'undefined' || root.empty()) return;

            // ---- parse do CSV largo ----
            const rows = d3.csvParse(o.csv.trim());
            const periodKey = rows.columns[0];
            const series = rows.columns.slice(1);
            const periods = rows.map(r => r[periodKey]);
            const n = periods.length;
            const data = rows.map(r => {
                const obj = {};
                series.forEach(s => { const v = r[s]; obj[s] = (v === '' || v == null) ? null : +v; });
                return obj;
            });
            const firstIdx = {};            // 1o periodo com dado, por serie (linhas que entram depois)
            series.forEach(s => { firstIdx[s] = data.findIndex(d => d[s] != null); });

            const color = {};
            series.forEach((s, i) => color[s] = PALETTE[i % PALETTE.length]);

            const W = 960, H = 1523; // 9:16: viewBox esticado em altura (W * 203/128) p/ o eixo de valor preencher a vertical
            const svg = root.append('svg').attr('viewBox', `0 0 ${W} ${H}`);
            const fmt = v => d3.format(',.' + o.decimals + 'f')(v) + (o.unit || '');

            // velocidade: stepMs = ms por periodo; durationMs (se vier) define a duracao total e tem prioridade
            const periodMs = (o.durationMs && n > 1) ? o.durationMs / (n - 1) : o.stepMs;
            // posicao no tempo (0..n-1); avanca uma vez e PARA no fim (sem loop)
            function posAt(elapsed) { return Math.min(elapsed / periodMs, n - 1); }

            let frame;
            if (o.mode === 'lines') frame = buildLines(); else frame = buildBars();

            // só começa quando o slide entra na viewport; roda uma vez e para no ultimo periodo
            const io = new IntersectionObserver(es => {
                es.forEach(e => {
                    if (e.isIntersecting) {
                        let timer = d3.timer(elapsed => { if (frame(elapsed)) timer.stop(); });
                        io.unobserve(e.target);
                    }
                });
            }, { threshold: 0.3 });
            io.observe(root.node());

            // ---------- MODO BARRAS ----------
            function buildBars() {
                const m = { top: 56, right: 110, left: 160, bottom: 22 };
                const N = Math.min(o.topN, series.length);
                const x = d3.scaleLinear().range([m.left, W - m.right]);
                const y = d3.scaleBand().domain(d3.range(N)).range([m.top, H - m.bottom]).padding(0.22);
                const gGrid = svg.append('g');
                const gAxis = svg.append('g');
                const gBars = svg.append('g');
                const clock = svg.append('text')
                    .attr('x', W - 30).attr('y', H - 26).attr('text-anchor', 'end')
                    .attr('font-size', 58).attr('font-weight', 900).attr('fill', PRIMARY)
                    .attr('opacity', 0.9);
                let dispMax = 0;
                const visualBars = new Map();
                let lastElapsed = 0;
                const rankLagMs = o.rankLagMs || 380;

                return function (elapsed) {
                    const dt = Math.max(0, elapsed - lastElapsed);
                    lastElapsed = elapsed;
                    const rankEase = elapsed <= 16 ? 1 : 1 - Math.exp(-dt / rankLagMs);
                    const pos = posAt(elapsed);
                    const i = Math.min(Math.floor(pos), n - 1);
                    const j = Math.min(i + 1, n - 1);
                    const f = pos - i;
                    const cur = series.map(s => {
                        const a = data[i][s] || 0, b = data[j][s] || 0;
                        return { name: s, value: a + (b - a) * f };
                    }).sort((p, q) => (q.value - p.value) || (p.name < q.name ? -1 : 1));
                    cur.forEach((d, r) => d.rank = r);
                    const shown = cur.slice(0, N);

                    const targetMax = d3.max(shown, d => d.value) || 1;
                    dispMax = (dispMax < 1 || pos >= n - 1) ? targetMax : dispMax + (targetMax - dispMax) * 0.12;
                    x.domain([0, dispMax]);

                    // grade vertical + ticks no topo
                    const ticks = x.ticks(5);
                    gGrid.selectAll('line').data(ticks).join('line')
                        .attr('x1', d => x(d)).attr('x2', d => x(d))
                        .attr('y1', m.top - 10).attr('y2', H - m.bottom)
                        .attr('stroke', 'rgba(255,255,255,0.08)');
                    gAxis.selectAll('text').data(ticks).join('text')
                        .attr('x', d => x(d)).attr('y', m.top - 18).attr('text-anchor', 'middle')
                        .attr('fill', 'rgba(255,255,255,0.4)').attr('font-size', 13)
                        .text(d => d3.format('~s')(d));

                    // barras (chave = nome da serie; posicao visual segue o rank com easing)
                    const shownNames = new Set(shown.map(d => d.name));
                    for (const name of visualBars.keys()) if (!shownNames.has(name)) visualBars.delete(name);

                    gBars.selectAll('g.bar').data(shown, d => d.name).join(
                        enter => {
                            const g = enter.append('g').attr('class', 'bar');
                            g.append('rect').attr('rx', 5).attr('height', y.bandwidth());
                            g.append('text').attr('class', 'nm').attr('text-anchor', 'end').attr('dy', '0.35em');
                            g.append('text').attr('class', 'vl').attr('text-anchor', 'start').attr('dy', '0.35em');
                            return g;
                        },
                        update => update,
                        exit => exit.remove()
                    ).each(function (d) {
                        const g = d3.select(this);
                        const targetY = y(d.rank);
                        let state = visualBars.get(d.name);
                        if (!state) {
                            state = { y: targetY };
                            visualBars.set(d.name, state);
                        } else {
                            state.y = pos >= n - 1 ? targetY : state.y + (targetY - state.y) * rankEase;
                        }
                        const cy = y.bandwidth() / 2;
                        g.attr('transform', `translate(0,${state.y})`);
                        g.select('rect').attr('x', m.left).attr('y', 0)
                            .attr('width', Math.max(0, x(d.value) - m.left)).attr('fill', color[d.name]);
                        g.select('.nm').attr('x', m.left - 12).attr('y', cy)
                            .attr('fill', '#fff').attr('font-size', 18).attr('font-weight', 600).text(d.name);
                        g.select('.vl').attr('x', x(d.value) + 10).attr('y', cy)
                            .attr('fill', 'rgba(255,255,255,0.85)').attr('font-size', 17).attr('font-weight', 700)
                            .text(fmt(d.value));
                    });

                    clock.text(periods[Math.round(pos)]);
                    return pos >= n - 1; // chegou ao fim: para o timer
                };
            }

            // ---------- MODO LINHAS ----------
            function buildLines() {
                const m = { top: 40, right: 150, left: 56, bottom: 42 };
                const gmax = d3.max(data, d => d3.max(series, s => d[s] || 0));
                const x = d3.scaleLinear().domain([0, n - 1]).range([m.left, W - m.right]);
                const y = d3.scaleLinear().domain([0, gmax]).nice().range([H - m.bottom, m.top]);
                const line = d3.line().x(d => x(d[0])).y(d => y(d[1])).curve(d3.curveMonotoneX);

                // eixos estaticos (desenhados uma vez)
                const yticks = y.ticks(5);
                svg.append('g').selectAll('line').data(yticks).join('line')
                    .attr('x1', m.left).attr('x2', W - m.right).attr('y1', d => y(d)).attr('y2', d => y(d))
                    .attr('stroke', 'rgba(255,255,255,0.07)');
                svg.append('g').selectAll('text').data(yticks).join('text')
                    .attr('x', m.left - 10).attr('y', d => y(d)).attr('dy', '0.32em').attr('text-anchor', 'end')
                    .attr('fill', 'rgba(255,255,255,0.4)').attr('font-size', 12)
                    .text(d => d3.format('~s')(d) + (o.unit || ''));
                const step = Math.max(1, Math.ceil(n / 7));
                svg.append('g').selectAll('text').data(d3.range(0, n, step)).join('text')
                    .attr('x', d => x(d)).attr('y', H - m.bottom + 22).attr('text-anchor', 'middle')
                    .attr('fill', 'rgba(255,255,255,0.4)').attr('font-size', 12).text(d => periods[d]);

                const gLines = svg.append('g');
                const gDots = svg.append('g');
                const gLabels = svg.append('g');
                const clock = svg.append('text')
                    .attr('x', W - 24).attr('y', m.top + 6).attr('text-anchor', 'end')
                    .attr('font-size', 30).attr('font-weight', 900).attr('fill', PRIMARY);

                return function (elapsed) {
                    const pos = posAt(elapsed);
                    const fi = Math.floor(pos);
                    const items = series.map(s => {
                        const start = firstIdx[s];
                        if (start < 0 || pos < start) return null;
                        const pts = [];
                        for (let k = start; k <= Math.min(fi, n - 1); k++) if (data[k][s] != null) pts.push([k, data[k][s]]);
                        if (fi + 1 < n && pos > fi) {
                            const a = data[fi][s], b = data[fi + 1][s];
                            if (a != null && b != null) pts.push([pos, a + (b - a) * (pos - fi)]);
                        }
                        if (!pts.length) return null;
                        return { name: s, pts, head: pts[pts.length - 1] };
                    }).filter(Boolean);

                    gLines.selectAll('path.ln').data(items, d => d.name)
                        .join(e => e.append('path').attr('class', 'ln').attr('fill', 'none')
                            .attr('stroke-width', 3).attr('stroke-linecap', 'round').attr('stroke-linejoin', 'round'))
                        .attr('stroke', d => color[d.name]).attr('d', d => line(d.pts));

                    gDots.selectAll('circle.hd').data(items, d => d.name)
                        .join(e => e.append('circle').attr('class', 'hd').attr('r', 5))
                        .attr('fill', d => color[d.name])
                        .attr('cx', d => x(d.head[0])).attr('cy', d => y(d.head[1]));

                    const labelGap = 21;
                    const labelTop = m.top + 8;
                    const labelBottom = H - m.bottom - 8;
                    const labelItems = items.map(d => Object.assign(d, { rawLabelY: y(d.head[1]) }))
                        .sort((a, b) => a.rawLabelY - b.rawLabelY);
                    labelItems.forEach((d, i) => {
                        d.labelY = i ? Math.max(d.rawLabelY, labelItems[i - 1].labelY + labelGap) : Math.max(d.rawLabelY, labelTop);
                    });
                    for (let i = labelItems.length - 1; i >= 0; i--) {
                        const maxY = i === labelItems.length - 1 ? labelBottom : labelItems[i + 1].labelY - labelGap;
                        labelItems[i].labelY = Math.min(labelItems[i].labelY, maxY);
                    }

                    gLabels.selectAll('g.lb').data(items, d => d.name).join(e => {
                        const g = e.append('g').attr('class', 'lb');
                        g.append('text').attr('class', 'n').attr('font-size', 16).attr('font-weight', 800);
                        g.append('text').attr('class', 'v').attr('font-size', 15).attr('font-weight', 700)
                            .attr('fill', 'rgba(255,255,255,0.66)');
                        return g;
                    }).each(function (d) {
                        const g = d3.select(this);
                        g.attr('transform', `translate(${x(d.head[0]) + 12},${d.labelY})`);
                        const name = g.select('.n').attr('fill', color[d.name]).text(d.name);
                        g.select('.v').attr('x', name.node().getComputedTextLength() + 9).text(fmt(d.head[1]));
                    });

                    clock.text(periods[Math.round(pos)]);
                    return pos >= n - 1; // chegou ao fim: para o timer
                };
            }
        }

        // ---- instanciar os dois slides ----
        // velocidade: 'bars' usa stepMs (ms por periodo); 'lines' usa durationMs (duracao total)
        miraChartRace({ selector: '#race-bars', csv: CSV_BARS, mode: 'bars', topN: 12, decimals: 1, stepMs: 2400 });
        miraChartRace({ selector: '#race-lines', csv: CSV_LINES, mode: 'lines', unit: '%', topN: 6, decimals: 1, durationMs: 16000 });
    </script>

    <!-- Controles de slide -->
    <script>
        AOS.init({ duration: 800, once: true });
        lucide.createIcons();
        (function () {
            const cards = Array.from(document.querySelectorAll('body > section'));
            if (!cards.length) return;
            const progress = document.getElementById('mira-progress');
            const nextBtn = document.getElementById('mira-next');
            const nextIcon = document.getElementById('mira-next-icon');
            const atBottom = () => (window.scrollY + window.innerHeight) >= (document.documentElement.scrollHeight - 100);
            function currentIndex() {
                const yy = window.scrollY + window.innerHeight * 0.3; let idx = -1;
                cards.forEach((c, i) => { if (c.offsetTop <= yy) idx = i; });
                return idx;
            }
            function goTo(i) { cards[Math.max(0, Math.min(cards.length - 1, i))].scrollIntoView({ behavior: 'smooth', block: 'start' }); }
            window.addEventListener('scroll', () => {
                const docH = document.documentElement.scrollHeight - window.innerHeight;
                progress.style.width = (docH > 0 ? (window.scrollY / docH) * 100 : 0) + '%';
                nextBtn.classList.toggle('visible', window.scrollY > 300);
                nextIcon.setAttribute('data-lucide', atBottom() ? 'chevron-up' : 'chevron-down');
                lucide.createIcons();
            });
            nextBtn.addEventListener('click', () => { if (atBottom()) window.scrollTo({ top: 0, behavior: 'smooth' }); else goTo(currentIndex() + 1); });
            document.addEventListener('keydown', e => {
                if (['ArrowRight', 'ArrowDown', 'PageDown'].includes(e.key)) { e.preventDefault(); goTo(currentIndex() + 1); }
                else if (['ArrowLeft', 'ArrowUp', 'PageUp'].includes(e.key)) { e.preventDefault(); const i = currentIndex(); i <= 0 ? window.scrollTo({ top: 0, behavior: 'smooth' }) : goTo(i - 1); }
                else if (e.key.toLowerCase() === 'f') { document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen(); }
            });
        })();
    </script>
    <script>
    // auto-ajuste de titulo (mira-vertical): reduz a fonte ate caber em <= 2 linhas
    (function () {
      const MAX_LINES = 2, MIN_FONT = 18;
      function fitTitles() {
        document.querySelectorAll('body > section h2').forEach(h2 => {
          h2.style.removeProperty('font-size');
          let font = parseFloat(getComputedStyle(h2).fontSize), guard = 0;
          while (h2.scrollHeight > parseFloat(getComputedStyle(h2).lineHeight) * MAX_LINES + 2 && font > MIN_FONT && guard < 90) {
            font -= 1; h2.style.setProperty('font-size', font + 'px', 'important'); guard++;
          }
        });
      }
      window.addEventListener('load', fitTitles);
      if (document.fonts && document.fonts.ready) document.fonts.ready.then(fitTitles);
      window.addEventListener('resize', () => { clearTimeout(window.__fitT); window.__fitT = setTimeout(fitTitles, 150); });
    })();
    </script>
</body>
